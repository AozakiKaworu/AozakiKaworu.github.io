<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时人脸检测</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #0f0f1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #e0e0e0;
            padding: 20px;
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 8px;
            color: #e94560;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 16px;
        }

        /* ---- 摄像头选择 ---- */
        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls label {
            font-size: 0.85rem;
            color: #aaa;
        }

        #cameraSelect {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #16213e;
            color: #e0e0e0;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            min-width: 200px;
        }

        #cameraSelect:focus {
            border-color: #e94560;
        }

        .mirror-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #aaa;
            cursor: pointer;
            user-select: none;
        }

        .mirror-toggle input {
            accent-color: #e94560;
            width: 16px;
            height: 16px;
        }

        /* ---- 画面容器 ---- */
        .container {
            position: relative;
            width: 100%;
            max-width: 720px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            background: #000;
        }

        #video {
            width: 100%;
            display: block;
        }

        #video.mirrored {
            transform: scaleX(-1);
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #canvas.mirrored {
            transform: scaleX(-1);
        }

        /* ---- 信息栏 ---- */
        .info-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .status {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s;
        }

        .status.loading {
            background: #2d3436;
            color: #dfe6e9;
        }

        .status.ready {
            background: #00b894;
            color: #fff;
        }

        .status.error {
            background: #d63031;
            color: #fff;
        }

        .face-count {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            background: #16213e;
            color: #e94560;
            font-weight: 600;
        }

        .fps {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            background: #16213e;
            color: #74b9ff;
        }

        .classroom-status {
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }

        .classroom-status.present {
            background: #00b894;
            color: #fff;
        }

        .classroom-status.away {
            background: #636e72;
            color: #fff;
        }

        .classroom-status.multi {
            background: #fdcb6e;
            color: #2d3436;
        }

        .permission-help {
            display: none;
            max-width: 720px;
            margin-top: 14px;
            padding: 12px 14px;
            border: 1px solid rgba(233, 69, 96, 0.35);
            border-radius: 10px;
            background: rgba(22, 33, 62, 0.9);
            color: #dfe6e9;
            font-size: 0.86rem;
            line-height: 1.6;
        }

        .permission-help.visible {
            display: block;
        }

        .retry-button {
            margin-top: 10px;
            padding: 8px 14px;
            border: 0;
            border-radius: 8px;
            background: #e94560;
            color: #fff;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }

        .retry-button:hover {
            background: #ff5c76;
        }
    </style>
</head>
<body>
    <h1>🔴 实时人脸检测</h1>
    <p class="subtitle">请允许浏览器访问摄像头</p>

    <!-- 摄像头选择 + 镜像开关 -->
    <div class="controls">
        <label for="cameraSelect">📷 摄像头：</label>
        <select id="cameraSelect">
            <option value="">正在枚举设备...</option>
        </select>
        <label class="mirror-toggle">
            <input type="checkbox" id="mirrorCheckbox" checked>
            🪞 镜像翻转
        </label>
    </div>

    <div class="container">
        <video id="video" class="mirrored" autoplay muted playsinline></video>
        <canvas id="canvas" class="mirrored"></canvas>
    </div>

    <div class="info-bar">
        <span class="status loading" id="status">⏳ 加载模型中...</span>
        <span class="face-count" id="faceCount">检测到: 0 人</span>
        <span class="classroom-status away" id="classroomStatus">课堂状态：离开</span>
        <span class="fps" id="fps">FPS: --</span>
    </div>

    <div class="permission-help" id="permissionHelp">
        摄像头权限被浏览器拒绝了。请点击地址栏左侧的网站权限图标，把摄像头改为“允许”，然后刷新页面或点击下面按钮。
        <br>
        如果仍然失败，请到 macOS“系统设置 → 隐私与安全性 → 摄像头”里允许当前浏览器访问摄像头。
        <br>
        <button class="retry-button" id="retryCameraBtn">重新请求摄像头</button>
    </div>

    <!-- face-api.js -->
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.js"></script>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        const faceCountEl = document.getElementById('faceCount');
        const fpsEl = document.getElementById('fps');
        const cameraSelect = document.getElementById('cameraSelect');
        const mirrorCheckbox = document.getElementById('mirrorCheckbox');
        const permissionHelp = document.getElementById('permissionHelp');
        const retryCameraBtn = document.getElementById('retryCameraBtn');

        const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model';

        const classroomStatusEl = document.getElementById('classroomStatus');

        let currentStream = null;
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 0;
        let detectLoopStarted = false;

        // 课堂状态追踪
        let noFaceSince = null;          // 首次检测不到脸的时间戳（null 表示当前有脸）
        const AWAY_THRESHOLD_MS = 3000;  // 连续 3 秒无人脸 → 离开

        function updateClassroomStatus(faceCount) {
            let state, cssClass, text;

            if (faceCount >= 2) {
                // 多人：立即生效
                state = 'multi';
                noFaceSince = null;
            } else if (faceCount === 1) {
                // 在座：立即生效
                state = 'present';
                noFaceSince = null;
            } else {
                // faceCount === 0：需要判断是否已持续 3 秒
                const now = performance.now();
                if (noFaceSince === null) {
                    noFaceSince = now;
                }
                if (now - noFaceSince >= AWAY_THRESHOLD_MS) {
                    state = 'away';
                } else {
                    // 还没到 3 秒，保持上一个状态不变
                    return;
                }
            }

            // 更新 DOM
            if (classroomStatusEl.dataset.state !== state) {
                classroomStatusEl.dataset.state = state;
                classroomStatusEl.className = 'classroom-status ' + state;

                const labels = { present: '课堂状态：在座', away: '课堂状态：离开', multi: '课堂状态：多人' };
                classroomStatusEl.textContent = labels[state];
            }
        }

        function showCameraError(err) {
            const isPermissionDenied = err && (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError');
            statusEl.textContent = isPermissionDenied
                ? '❌ 摄像头权限被拒绝'
                : '❌ 无法访问摄像头: ' + (err && err.message ? err.message : '未知错误');
            statusEl.className = 'status error';
            permissionHelp.classList.add('visible');
        }

        // ---------- 枚举所有摄像头 ----------
        async function enumerateCameras() {
            // 先请求一次权限，否则 enumerateDevices 返回的 label 可能为空
            try {
                const tempStream = await navigator.mediaDevices.getUserMedia({ video: true });
                tempStream.getTracks().forEach(t => t.stop());
            } catch (e) {
                console.error('请求摄像头权限失败:', e);
                showCameraError(e);
            }

            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoInputs = devices.filter(d => d.kind === 'videoinput');

            // 调试：打印所有找到的视频设备
            console.log(`🔍 找到 ${videoInputs.length} 个视频设备:`);
            videoInputs.forEach((d, i) => {
                console.log(`  [${i}] label="${d.label}" deviceId="${d.deviceId.slice(0, 30)}..." groupId="${d.groupId}"`);
            });

            cameraSelect.innerHTML = '';

            if (videoInputs.length === 0) {
                cameraSelect.innerHTML = '<option value="">未检测到摄像头</option>';
                return [];
            }

            videoInputs.forEach((device, i) => {
                const option = document.createElement('option');
                option.value = device.deviceId;
                option.textContent = device.label || `摄像头 ${i + 1}`;
                cameraSelect.appendChild(option);
            });

            // 默认选第一个（通常是外接相机优先，或内置）
            // 尝试优先选择外接相机（label 中不含 "built-in" 的）
            const externalCam = videoInputs.find(d =>
                d.label && !d.label.toLowerCase().includes('built-in') && !d.label.includes('内建')
            );
            if (externalCam) {
                cameraSelect.value = externalCam.deviceId;
                console.log('✅ 自动选择外接相机:', externalCam.label);
            }

            return videoInputs;
        }

        // ---------- 启动指定摄像头 ----------
        async function startCamera(deviceId) {
            // 先停掉旧流
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
                currentStream = null;
            }

            const constraints = {
                video: {
                    width: { ideal: 720 },
                    height: { ideal: 560 }
                }
            };

            // 如果指定了设备 ID，精确匹配
            if (deviceId) {
                constraints.video.deviceId = { exact: deviceId };
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                currentStream = stream;
                video.srcObject = stream;
                return new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve();
                    };
                });
            } catch (err) {
                showCameraError(err);
                throw err;
            }
        }

        // ---------- 应用镜像设置 ----------
        function applyMirror() {
            const mirrored = mirrorCheckbox.checked;
            if (mirrored) {
                video.classList.add('mirrored');
                canvas.classList.add('mirrored');
            } else {
                video.classList.remove('mirrored');
                canvas.classList.remove('mirrored');
            }
        }

        // ---------- 加载人脸检测模型 ----------
        async function loadModels() {
            console.log('开始加载模型: ' + MODEL_URL);
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            console.log('✅ 模型加载成功');
        }

        // ---------- 检测并绘制 ----------
        async function detectAndDraw() {
            if (video.paused || video.ended) {
                requestAnimationFrame(detectAndDraw);
                return;
            }

            const displayWidth = video.videoWidth;
            const displayHeight = video.videoHeight;
            if (canvas.width !== displayWidth || canvas.height !== displayHeight) {
                canvas.width = displayWidth;
                canvas.height = displayHeight;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const options = new faceapi.TinyFaceDetectorOptions({
                inputSize: 320,
                scoreThreshold: 0.5
            });

            let detections = [];
            try {
                const result = await faceapi.detectAllFaces(video, options);
                detections = result;
            } catch (e) {
                console.error('人脸检测出错:', e.message || e);
            }

            detections.forEach(det => {
                const { x, y, width, height } = det.box;

                // 红色发光边框
                ctx.strokeStyle = '#ff1744';
                ctx.lineWidth = Math.max(3, displayWidth / 200);
                ctx.shadowColor = '#ff1744';
                ctx.shadowBlur = 12;
                ctx.strokeRect(x, y, width, height);
                ctx.shadowBlur = 0;

                // 四角加强标记
                const cornerLen = Math.min(width, height) * 0.25;
                ctx.strokeStyle = '#ff5252';
                ctx.lineWidth = Math.max(4, displayWidth / 130);

                [
                    [x, y, 1, 1],           // 左上
                    [x + width, y, -1, 1],  // 右上
                    [x, y + height, 1, -1], // 左下
                    [x + width, y + height, -1, -1] // 右下
                ].forEach(([cx, cy, dx, dy]) => {
                    ctx.beginPath();
                    ctx.moveTo(cx, cy + dy * cornerLen);
                    ctx.lineTo(cx, cy);
                    ctx.lineTo(cx + dx * cornerLen, cy);
                    ctx.stroke();
                });
            });

            faceCountEl.textContent = `检测到: ${detections.length} 人`;
            updateClassroomStatus(detections.length);

            frameCount++;
            const now = performance.now();
            if (now - lastTime >= 1000) {
                fps = Math.round(frameCount / ((now - lastTime) / 1000));
                frameCount = 0;
                lastTime = now;
                fpsEl.textContent = `FPS: ${fps}`;
            }

            requestAnimationFrame(detectAndDraw);
        }

        // ---------- 切换摄像头 ----------
        cameraSelect.addEventListener('change', async () => {
            statusEl.textContent = '⏳ 切换摄像头...';
            statusEl.className = 'status loading';
            try {
                await startCamera(cameraSelect.value);
                statusEl.textContent = '✅ 检测中';
                statusEl.className = 'status ready';
            } catch (e) {
                // 错误已在 startCamera 中处理
            }
        });

        // ---------- 镜像开关 ----------
        mirrorCheckbox.addEventListener('change', applyMirror);

        // ---------- 主流程 ----------
        (async function main() {
            try {
                // 枚举摄像头并填充下拉框
                const cameras = await enumerateCameras();
                if (cameras.length === 0) {
                    statusEl.textContent = '⚠️ 未检测到摄像头设备';
                    statusEl.className = 'status error';
                    return;
                }

                // 并行：加载模型 + 启动摄像头（使用当前选中的设备）
                const selectedId = cameraSelect.value;
                statusEl.textContent = '⏳ 下载AI模型中...';
                await Promise.all([loadModels(), startCamera(selectedId)]);

                applyMirror();
                permissionHelp.classList.remove('visible');
                statusEl.textContent = '✅ 检测中';
                statusEl.className = 'status ready';

                if (!detectLoopStarted) {
                    detectLoopStarted = true;
                    detectAndDraw();
                }
            } catch (err) {
                console.error('初始化失败:', err);
                showCameraError(err);
            }
        })();

        retryCameraBtn.addEventListener('click', async () => {
            try {
                statusEl.textContent = '⏳ 正在重新请求摄像头...';
                statusEl.className = 'status loading';
                await startCamera(cameraSelect.value);
                permissionHelp.classList.remove('visible');
                statusEl.textContent = '✅ 检测中';
                statusEl.className = 'status ready';
                if (!detectLoopStarted) {
                    detectLoopStarted = true;
                    detectAndDraw();
                }
            } catch (err) {
                console.error('重新请求摄像头失败:', err);
                showCameraError(err);
            }
        });
    </script>
</body>
</html>
