<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>иҜҫе ӮзҠ¶жҖҒжЈҖжөӢ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;flex-direction:column;align-items:center;min-height:100vh;
  background:#0f0f1a;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:16px}
h1{font-size:1.4rem;color:#e94560;margin-bottom:2px}
.sub{font-size:0.78rem;color:#888;margin-bottom:14px}

.video-wrap{position:relative;width:min(96vw,960px);border-radius:12px;
  overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,0.5);background:#000}
.video-wrap img{width:100%;display:block}

.bar{display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap;justify-content:center}
.badge{padding:5px 12px;border-radius:14px;font-size:0.78rem;font-weight:600}
.b{color:#e94560;background:#16213e}.u{color:#fff;background:#00b894}
.d{color:#fff;background:#0984e3}.s{color:#fff;background:#fd7e14}
.k{color:#fff;background:#636e72}.f{color:#74b9ff;background:#16213e;font-size:0.72rem}
.src{color:#a29bfe;background:#16213e;font-size:0.7rem;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.json-panel{width:min(96vw,960px);margin-top:14px;background:#111827;
  border-radius:10px;border:1px solid #2d3748;overflow:hidden}
.json-h{display:flex;justify-content:space-between;align-items:center;
  padding:7px 14px;background:#1a2332;font-size:0.78rem;color:#a0aec0;cursor:pointer}
.json-b{padding:10px 14px;font-size:0.72rem;font-family:'SF Mono',Menlo,monospace;
  color:#cbd5e0;max-height:300px;overflow-y:auto;white-space:pre-wrap;display:none}
.json-b.open{display:block}

.err{margin-top:10px;padding:8px 14px;border-radius:8px;
  background:rgba(214,48,49,0.2);color:#ff7675;font-size:0.78rem;display:none}
</style>
</head>
<body>
<h1>рҹҺ“ иҜҫе ӮзҠ¶жҖҒжЈҖжөӢ</h1>
<p class="sub">еҗҺз«ҜеӨ„зҗҶ В· еүҚз«Ҝд»…жҳҫзӨә В· еҲ·ж–°йЎөйқўйҮҚиҝһи§Ҷйў‘жөҒ</p>

<div class="video-wrap">
  <img id="vi" src="/video" alt="и§Ҷйў‘жөҒ">
</div>

<div class="bar">
  <span class="badge b" id="tb">жЈҖжөӢ: --</span>
  <span class="badge u" id="ub">жҠ¬еӨҙ: --</span>
  <span class="badge d" id="db">зңӢжЎҢйқў: --</span>
  <span class="badge s" id="sb">з–‘дјјзқЎи§ү: --</span>
  <span class="badge k" id="kb">жңӘзҹҘ: --</span>
  <span class="badge f" id="fb">FPS: --</span>
</div>

<div class="json-panel">
  <div class="json-h" id="jh">рҹ“Ӣ JSON зҠ¶жҖҒж•°жҚ® в–ё</div>
  <div class="json-b" id="jb"></div>
</div>

<div class="err" id="er"></div>

<script>
const API = '/api/status';
const HEALTH = '/api/health';

setInterval(()=>{
  fetch(API).then(r=>r.json()).then(d=>{
    const s=d.summary;
    tb.textContent=`жЈҖжөӢ: ${s.total} дәә`;
    ub.textContent=`жҠ¬еӨҙ: ${s.headUp}`;
    db.textContent=`зңӢжЎҢйқў: ${s.desk}`;
    sb.textContent=`з–‘дјјзқЎи§ү: ${s.sleepLike}`;
    kb.textContent=`жңӘзҹҘ: ${s.unknown}`;
    fb.textContent=`FPS: ${d.frameInfo.fps}`;
    jb.textContent=JSON.stringify(d,null,2);
    er.style.display='none';
  }).catch(e=>{er.style.display='block';er.textContent='вҡ пёҸ ж— жі•иҝһжҺҘеҗҺз«Ҝ'});
},1000);

fetch(HEALTH).then(r=>r.json()).then(d=>{
  if(!d.connected) er.style.display='block',er.textContent='вҡ пёҸ и§Ҷйў‘жәҗжңӘиҝһжҺҘ';
}).catch(()=>{});

jh.onclick=()=>{
  const o=jb.classList.toggle('open');
  jh.textContent=o?'рҹ“Ӣ JSON зҠ¶жҖҒж•°жҚ® в–ҫ':'рҹ“Ӣ JSON зҠ¶жҖҒж•°жҚ® в–ё';
};

vi.onerror=()=>{er.style.display='block';er.textContent='вҡ пёҸ и§Ҷйў‘жөҒжңӘиҝһжҺҘпјҢиҜ·зЎ®и®ӨеҗҺз«Ҝе·ІеҗҜеҠЁ'};
</script>
</body>
</html>
