<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时人脸检测</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #0f0f1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #e0e0e0;
            padding: 20px;
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 8px;
            color: #e94560;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 16px;
        }

        /* ---- 摄像头选择 ---- */
        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls label {
            font-size: 0.85rem;
            color: #aaa;
        }

        #cameraSelect {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #16213e;
            color: #e0e0e0;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            min-width: 200px;
        }

        #cameraSelect:focus {
            border-color: #e94560;
        }

        .mirror-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #aaa;
            cursor: pointer;
            user-select: none;
        }

        .mirror-toggle input {
            accent-color: #e94560;
            width: 16px;
            height: 16px;
        }

        .mode-toggle {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #16213e;
            color: #74b9ff;
            font-size: 0.85rem;
            cursor: pointer;
            user-select: none;
            transition: all 0.3s;
        }

        .mode-toggle:hover {
            border-color: #74b9ff;
        }

        .mode-toggle.classroom {
            background: #fdcb6e;
            color: #2d3436;
            border-color: #fdcb6e;
            font-weight: 600;
        }

        /* ---- 画面容器 ---- */
        .container {
            position: relative;
            width: min(96vw, 1100px);
            aspect-ratio: 16 / 9;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            background: #000;
        }

        #video,
        #canvas {
            width: 100%;
            height: 100%;
        }

        #video {
            position: relative;
            z-index: 1;
            display: block;
            object-fit: cover;
        }

        #video.mirrored {
            transform: scaleX(-1);
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            pointer-events: none;
        }

        #canvas.mirrored {
            transform: scaleX(-1);
        }

        /* ---- 信息栏 ---- */
        .info-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .status {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s;
        }

        .status.loading {
            background: #2d3436;
            color: #dfe6e9;
        }

        .status.ready {
            background: #00b894;
            color: #fff;
        }

        .status.error {
            background: #d63031;
            color: #fff;
        }

        .face-count {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            background: #16213e;
            color: #e94560;
            font-weight: 600;
        }

        .fps {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            background: #16213e;
            color: #74b9ff;
        }

        .classroom-status {
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }

        .classroom-status.present {
            background: #00b894;
            color: #fff;
        }

        .classroom-status.away {
            background: #636e72;
            color: #fff;
        }

        .classroom-status.multi {
            background: #fdcb6e;
            color: #2d3436;
        }

        .state-duration {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            background: #16213e;
            color: #a29bfe;
        }

        .permission-help {
            display: none;
            max-width: 720px;
            margin-top: 14px;
            padding: 12px 14px;
            border: 1px solid rgba(233, 69, 96, 0.35);
            border-radius: 10px;
            background: rgba(22, 33, 62, 0.9);
            color: #dfe6e9;
            font-size: 0.86rem;
            line-height: 1.6;
        }

        .permission-help.visible {
            display: block;
        }

        .retry-button {
            margin-top: 10px;
            padding: 8px 14px;
            border: 0;
            border-radius: 8px;
            background: #e94560;
            color: #fff;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }

        .retry-button:hover {
            background: #ff5c76;
        }

        /* ---- 调试信息 ---- */
        .debug-info {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
            font-size: 0.75rem;
            color: #888;
        }

        .debug-info span {
            padding: 3px 10px;
            border-radius: 10px;
            background: rgba(22, 33, 62, 0.6);
        }
    </style>
</head>
<body>
    <h1>🔴 实时人脸检测</h1>
    <p class="subtitle">请允许浏览器访问摄像头</p>

    <!-- 摄像头选择 + 镜像开关 -->
    <div class="controls">
        <label for="cameraSelect">📷 摄像头：</label>
        <select id="cameraSelect">
            <option value="">正在枚举设备...</option>
        </select>
        <label class="mirror-toggle">
            <input type="checkbox" id="mirrorCheckbox" checked>
            🪞 镜像翻转
        </label>
        <button class="mode-toggle" id="modeToggleBtn" title="切换大教室分块检测模式">🏫 普通模式</button>
        <label class="mirror-toggle">
            <input type="checkbox" id="showBoxCheckbox" checked>
            👁 显示检测框
        </label>
    </div>

    <div class="container">
        <video id="video" class="mirrored" autoplay muted playsinline></video>
        <canvas id="canvas" class="mirrored"></canvas>
    </div>

    <div class="info-bar">
        <span class="status loading" id="status">⏳ 加载模型中...</span>
        <span class="face-count" id="faceCount">检测到: 0 人</span>
        <span class="classroom-status away" id="classroomStatus">课堂状态：离开</span>
        <span class="state-duration" id="stateDuration">持续：--</span>
        <span class="fps" id="fps">FPS: --</span>
    </div>

    <!-- 调试信息 -->
    <div class="debug-info" id="debugInfo">
        <span id="debugVideoSize">视频: --</span>
        <span id="debugLastScore">最后置信度: --</span>
        <span id="debugEngine">引擎: MediaPipe</span>
    </div>

    <div class="permission-help" id="permissionHelp">
        摄像头权限被浏览器拒绝了。请点击地址栏左侧的网站权限图标，把摄像头改为“允许”，然后刷新页面或点击下面按钮。
        <br>
        如果仍然失败，请到 macOS“系统设置 → 隐私与安全性 → 摄像头”里允许当前浏览器访问摄像头。
        <br>
        <button class="retry-button" id="retryCameraBtn">重新请求摄像头</button>
    </div>

    <!-- MediaPipe Tasks Vision -->
    <script type="module">
        import { FaceDetector, FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest";

        // ========== DOM 元素 ==========
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const statusEl = document.getElementById('status');
        const faceCountEl = document.getElementById('faceCount');
        const fpsEl = document.getElementById('fps');
        const cameraSelect = document.getElementById('cameraSelect');
        const mirrorCheckbox = document.getElementById('mirrorCheckbox');
        const permissionHelp = document.getElementById('permissionHelp');
        const retryCameraBtn = document.getElementById('retryCameraBtn');
        const classroomStatusEl = document.getElementById('classroomStatus');
        const stateDurationEl = document.getElementById('stateDuration');
        const debugVideoSize = document.getElementById('debugVideoSize');
        const debugLastScore = document.getElementById('debugLastScore');
        const debugEngine = document.getElementById('debugEngine');
        const modeToggleBtn = document.getElementById('modeToggleBtn');
        const showBoxCheckbox = document.getElementById('showBoxCheckbox');

        // ========== MediaPipe 配置 ==========
        const WASM_URL = "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm";
        const MODEL_URL = "https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/latest/blaze_face_short_range.tflite";
        const LANDMARKER_URL = "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task";

        // ========== 全局状态 ==========
        let faceDetector = null;
        let faceLandmarker = null;
        let currentStream = null;
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 0;
        let detectLoopStarted = false;

        // 课堂状态追踪
        let noFaceSince = null;
        const AWAY_THRESHOLD_MS = 3000;

        // 状态时长追踪
        let currentClassroomState = 'away';
        let stateChangedAt = Date.now();
        let durationTimerStarted = false;

        // 检测模式：'normal' | 'classroom'
        // ---- 检测模式 ----
        let detectionMode = 'normal';
        const GRID_COLS = 3;
        const GRID_ROWS = 2;
        const DETECT_INTERVAL_MS = 250;
        let lastDetectTime = 0;
        let lastDetections = [];

        // 尺寸阈值（按模式）
        function getFaceThresholds() {
            if (detectionMode === 'classroom') {
                return { minW: 45, minH: 45, reliableW: 80, reliableH: 80, minConf: 0.35 };
            }
            return { minW: 70, minH: 70, reliableW: 80, reliableH: 80, minConf: 0.50 };
        }

        // 跟踪状态：EMA 平滑 + 帧计数
        // trackedFaces: Map<id, { box, score, confirmed, lost, keypoints }>
        let trackedFaces = [];
        const CONFIRM_FRAMES = 3;   // 连续 3 帧才显示
        const LOST_FRAMES = 5;      // 连续 5 帧丢失才移除
        const EMA_ALPHA = 0.3;      // 平滑系数 (new=0.3, old=0.7)
        let nextFaceId = 0;
        let showDetectionBox = true; // 显示检测框开关

        // 调试
        let debugLastLog = 0;
        let lastConfidence = null;

        // ========== 课堂状态 ==========
        function updateClassroomStatus(faceCount) {
            let state;

            if (faceCount >= 2) {
                state = 'multi';
                noFaceSince = null;
            } else if (faceCount === 1) {
                state = 'present';
                noFaceSince = null;
            } else {
                const now = performance.now();
                if (noFaceSince === null) noFaceSince = now;
                if (now - noFaceSince >= AWAY_THRESHOLD_MS) {
                    state = 'away';
                } else {
                    return;
                }
            }

            if (classroomStatusEl.dataset.state !== state) {
                classroomStatusEl.dataset.state = state;
                classroomStatusEl.className = 'classroom-status ' + state;
                const labels = { present: '课堂状态：在座', away: '课堂状态：离开', multi: '课堂状态：多人' };
                classroomStatusEl.textContent = labels[state];
                currentClassroomState = state;
                stateChangedAt = Date.now();
                updateDurationDisplay();
            }
        }

        function updateDurationDisplay() {
            if (!stateChangedAt) {
                stateDurationEl.textContent = '持续：--';
                return;
            }
            const elapsed = Math.floor((Date.now() - stateChangedAt) / 1000);
            const mm = Math.floor(elapsed / 60);
            const ss = elapsed % 60;
            stateDurationEl.textContent = `持续：${mm}分${String(ss).padStart(2, '0')}秒`;
            console.log(`⏱ 持续时间刷新: ${mm}分${String(ss).padStart(2, '0')}秒 (stateChangedAt=${stateChangedAt})`);
        }

        // 立即启动持续时间刷新定时器（不依赖 main 异步流程）
        if (!durationTimerStarted) {
            durationTimerStarted = true;
            updateDurationDisplay();
            setInterval(updateDurationDisplay, 1000);
            console.log('✅ 持续时间定时器已启动');
        }

        // ========== 摄像头 ==========
        function showCameraError(err) {
            const isPermissionDenied = err && (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError');
            statusEl.textContent = isPermissionDenied
                ? '❌ 摄像头权限被拒绝'
                : '❌ 无法访问摄像头: ' + (err && err.message ? err.message : '未知错误');
            statusEl.className = 'status error';
            permissionHelp.classList.add('visible');
        }

        async function enumerateCameras() {
            try {
                const tempStream = await navigator.mediaDevices.getUserMedia({ video: true });
                tempStream.getTracks().forEach(t => t.stop());
            } catch (e) {
                console.error('请求摄像头权限失败:', e);
                showCameraError(e);
            }

            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoInputs = devices.filter(d => d.kind === 'videoinput');

            console.log(`🔍 找到 ${videoInputs.length} 个视频设备:`);
            videoInputs.forEach((d, i) => {
                console.log(`  [${i}] label="${d.label}" deviceId="${d.deviceId.slice(0, 30)}..." groupId="${d.groupId}"`);
            });

            cameraSelect.innerHTML = '';
            if (videoInputs.length === 0) {
                cameraSelect.innerHTML = '<option value="">未检测到摄像头</option>';
                return [];
            }

            videoInputs.forEach((device, i) => {
                const option = document.createElement('option');
                option.value = device.deviceId;
                option.textContent = device.label || `摄像头 ${i + 1}`;
                cameraSelect.appendChild(option);
            });

            const externalCam = videoInputs.find(d =>
                d.label && !d.label.toLowerCase().includes('built-in') && !d.label.includes('内建')
            );
            if (externalCam) {
                cameraSelect.value = externalCam.deviceId;
                console.log('✅ 自动选择外接相机:', externalCam.label);
            }

            return videoInputs;
        }

        async function startCamera(deviceId) {
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
                currentStream = null;
            }

            const constraints = {
                video: {
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                }
            };
            if (deviceId) constraints.video.deviceId = { exact: deviceId };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                currentStream = stream;
                video.srcObject = stream;
                return new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve();
                    };
                });
            } catch (err) {
                showCameraError(err);
                throw err;
            }
        }

        function applyMirror() {
            const mirrored = mirrorCheckbox.checked;
            if (mirrored) {
                video.classList.add('mirrored');
                canvas.classList.add('mirrored');
            } else {
                video.classList.remove('mirrored');
                canvas.classList.remove('mirrored');
            }
        }

        // ========== 加载 MediaPipe 模型 ==========
        async function loadModels() {
            console.log('🔧 初始化 MediaPipe WASM...');
            const vision = await FilesetResolver.forVisionTasks(WASM_URL);
            console.log('✅ WASM 运行时就绪');

            // 并行加载 FaceDetector + FaceLandmarker
            let delegate = 'GPU';
            const detectorOpts = (d) => ({
                baseOptions: { modelAssetPath: MODEL_URL, delegate: d },
                runningMode: 'IMAGE',
                minDetectionConfidence: 0.3
            });
            const landmarkerOpts = (d) => ({
                baseOptions: { modelAssetPath: LANDMARKER_URL, delegate: d },
                runningMode: 'IMAGE',
                numFaces: 1,
                minFaceDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            try {
                [faceDetector, faceLandmarker] = await Promise.all([
                    FaceDetector.createFromOptions(vision, detectorOpts('GPU')),
                    FaceLandmarker.createFromOptions(vision, landmarkerOpts('GPU'))
                ]);
            } catch (gpuErr) {
                console.warn('⚠️ GPU 不可用，降级为 CPU:', gpuErr.message || gpuErr);
                delegate = 'CPU';
                [faceDetector, faceLandmarker] = await Promise.all([
                    FaceDetector.createFromOptions(vision, detectorOpts('CPU')),
                    FaceLandmarker.createFromOptions(vision, landmarkerOpts('CPU'))
                ]);
            }

            debugEngine.textContent = `引擎: Detector+Landmarker IMAGE (${delegate})`;
            console.log(`✅ 双模型加载成功 (${delegate})`);
        }

        // ========== 人脸检测 + 绘制 ==========
        // 6 关键点名称（blaze_face_short_range）
        const KEYPOINT_NAMES = ['左眼', '右眼', '鼻尖', '嘴', '左耳', '右耳'];
        const KEYPOINT_COLORS = ['#00e5ff', '#00e5ff', '#ffea00', '#ff6d00', '#76ff03', '#76ff03'];

        // Head pose estimation: landmark indices (Face Landmarker 468-point model)
        const LM_NOSE_TIP = 1;
        const LM_FOREHEAD = 10;     // glabella, between eyebrows
        const LM_CHIN = 152;        // lowest point on chin
        const LM_LEFT_EYE = 33;     // left eye outer corner
        const LM_RIGHT_EYE = 263;   // right eye outer corner

        // ---- 工具：video → canvas ----
        function videoToCanvas(targetCanvas) {
            const targetCtx = targetCanvas.getContext('2d', { willReadFrequently: true });
            targetCanvas.width = video.videoWidth;
            targetCanvas.height = video.videoHeight;
            targetCtx.drawImage(video, 0, 0);
        }

        // ---- 工具：在 canvas 上检测人脸 ----
        async function detectOnCanvas(sourceCanvas) {
            if (!faceDetector) return { detections: [] };
            try {
                return faceDetector.detect(sourceCanvas);
            } catch (e) {
                console.error('检测出错:', e.message || e);
                return { detections: [] };
            }
        }

        // ---- 大教室模式：2×3 网格分块检测 ----
        async function detectGrid() {
            const fullW = video.videoWidth;
            const fullH = video.videoHeight;
            if (!fullW || !fullH) return [];

            // 1) video → 全幅 canvas
            const fullCanvas = document.createElement('canvas');
            const fullCtx = fullCanvas.getContext('2d', { willReadFrequently: true });
            fullCanvas.width = fullW;
            fullCanvas.height = fullH;
            fullCtx.drawImage(video, 0, 0);

            const tileW = fullW / GRID_COLS;
            const tileH = fullH / GRID_ROWS;
            const allDetections = [];

            // 2) 逐块检测
            for (let row = 0; row < GRID_ROWS; row++) {
                for (let col = 0; col < GRID_COLS; col++) {
                    const srcX = Math.floor(col * tileW);
                    const srcY = Math.floor(row * tileH);
                    const srcW = Math.ceil(tileW);
                    const srcH = Math.ceil(tileH);

                    const tileCanvas = document.createElement('canvas');
                    tileCanvas.width = srcW;
                    tileCanvas.height = srcH;
                    const tileCtx = tileCanvas.getContext('2d', { willReadFrequently: true });
                    tileCtx.drawImage(fullCanvas, srcX, srcY, srcW, srcH, 0, 0, srcW, srcH);

                    const result = await detectOnCanvas(tileCanvas);
                    if (result.detections) {
                        for (const det of result.detections) {
                            // 坐标映射回原始画面
                            det.boundingBox.originX += srcX;
                            det.boundingBox.originY += srcY;
                            if (det.keypoints) {
                                for (const kp of det.keypoints) {
                                    kp.x += srcX;
                                    kp.y += srcY;
                                }
                            }
                            det._gridRow = row;
                            det._gridCol = col;
                            allDetections.push(det);
                        }
                    }
                }
            }

            // 3) 去重：合并高度重叠的框（IoU > 0.5）
            return mergeDetections(allDetections);
        }

        function mergeDetections(detections) {
            if (detections.length <= 1) return detections;

            // 按置信度降序排列
            detections.sort((a, b) => {
                const sa = a.categories?.[0]?.score ?? 0;
                const sb = b.categories?.[0]?.score ?? 0;
                return sb - sa;
            });

            const merged = [];
            const suppressed = new Set();

            for (let i = 0; i < detections.length; i++) {
                if (suppressed.has(i)) continue;
                merged.push(detections[i]);
                const boxA = detections[i].boundingBox;

                for (let j = i + 1; j < detections.length; j++) {
                    if (suppressed.has(j)) continue;
                    const boxB = detections[j].boundingBox;

                    // 计算 IoU
                    const ax1 = boxA.originX, ay1 = boxA.originY;
                    const ax2 = ax1 + boxA.width, ay2 = ay1 + boxA.height;
                    const bx1 = boxB.originX, by1 = boxB.originY;
                    const bx2 = bx1 + boxB.width, by2 = by1 + boxB.height;

                    const interX = Math.max(0, Math.min(ax2, bx2) - Math.max(ax1, bx1));
                    const interY = Math.max(0, Math.min(ay2, by2) - Math.max(ay1, by1));
                    const interArea = interX * interY;
                    const unionArea = boxA.width * boxA.height + boxB.width * boxB.height - interArea;

                    if (unionArea > 0 && interArea / unionArea > 0.5) {
                        suppressed.add(j);
                    }
                }
            }

            return merged;
        }

        // ========== 头部姿态估计（Face Landmarker） ==========
        function estimateHeadPoseFromLandmarks(landmarks) {
            if (!landmarks || landmarks.length < 264) return null;

            const nose = landmarks[LM_NOSE_TIP];
            const forehead = landmarks[LM_FOREHEAD];
            const chin = landmarks[LM_CHIN];
            const leftEye = landmarks[LM_LEFT_EYE];
            const rightEye = landmarks[LM_RIGHT_EYE];

            if (!nose || !forehead || !chin || !leftEye || !rightEye) return null;

            // 眼中心
            const eyeMidY = (leftEye.y + rightEye.y) / 2;

            // pitch 比率：鼻尖相对于眼-下巴的位置
            // 正常 ≈0.43，低头时鼻子靠近眼睛(↓)，抬头时鼻子远离(↑)
            const eyeToChin = chin.y - eyeMidY;
            const eyeToNose = nose.y - eyeMidY;
            const pitchRatio = eyeToChin > 0 ? eyeToNose / eyeToChin : 0;

            // yaw 估计：鼻尖水平偏移 vs 眼中心
            const eyeMidX = (leftEye.x + rightEye.x) / 2;
            const noseOffsetX = nose.x - eyeMidX;
            const eyeWidth = Math.abs(rightEye.x - leftEye.x);
            const yawRatio = eyeWidth > 0 ? noseOffsetX / eyeWidth : 0;

            // 分类
            let headState;
            if (pitchRatio < 0.33) headState = 'down';        // 低头
            else if (pitchRatio > 0.52) headState = 'up';     // 抬头
            else if (Math.abs(yawRatio) > 0.18) headState = 'side'; // 侧脸
            else headState = 'normal';

            return {
                pitchRatio: pitchRatio.toFixed(2),
                yawRatio: yawRatio.toFixed(2),
                state: headState,
                label: { down: '低头', up: '抬头', side: '侧脸', normal: '正常' }[headState]
            };
        }

        async function runFaceLandmarker(sourceCanvas, faceBox) {
            if (!faceLandmarker) return null;
            // 裁剪人脸区域
            const fx = Math.max(0, Math.floor(faceBox.originX));
            const fy = Math.max(0, Math.floor(faceBox.originY));
            const fw = Math.ceil(faceBox.width);
            const fh = Math.ceil(faceBox.height);

            const faceCanvas = document.createElement('canvas');
            faceCanvas.width = fw;
            faceCanvas.height = fh;
            const faceCtx = faceCanvas.getContext('2d', { willReadFrequently: true });
            faceCtx.drawImage(sourceCanvas, fx, fy, fw, fh, 0, 0, fw, fh);

            try {
                const result = faceLandmarker.detect(faceCanvas);
                if (result.faceLandmarks && result.faceLandmarks.length > 0) {
                    return estimateHeadPoseFromLandmarks(result.faceLandmarks[0]);
                }
            } catch (e) {
                // 静默失败
            }
            return null;
        }

        // ========== 人脸跟踪 + 平滑 + 三层过滤 ==========
        function iou(boxA, boxB) {
            const ax1 = boxA.originX, ay1 = boxA.originY;
            const ax2 = ax1 + boxA.width, ay2 = ay1 + boxA.height;
            const bx1 = boxB.originX, by1 = boxB.originY;
            const bx2 = bx1 + boxB.width, by2 = by1 + boxB.height;
            const interX = Math.max(0, Math.min(ax2, bx2) - Math.max(ax1, bx1));
            const interY = Math.max(0, Math.min(ay2, by2) - Math.max(ay1, by1));
            const inter = interX * interY;
            const union = boxA.width * boxA.height + boxB.width * boxB.height - inter;
            return union > 0 ? inter / union : 0;
        }

        function smoothBox(oldBox, newBox) {
            if (!oldBox) return { originX: newBox.originX, originY: newBox.originY, width: newBox.width, height: newBox.height };
            return {
                originX: oldBox.originX * (1 - EMA_ALPHA) + newBox.originX * EMA_ALPHA,
                originY: oldBox.originY * (1 - EMA_ALPHA) + newBox.originY * EMA_ALPHA,
                width:   oldBox.width   * (1 - EMA_ALPHA) + newBox.width   * EMA_ALPHA,
                height:  oldBox.height  * (1 - EMA_ALPHA) + newBox.height  * EMA_ALPHA,
            };
        }

        function classifyDetection(box, score) {
            const t = getFaceThresholds();
            if (box.width < t.minW || box.height < t.minH) return 'ignore';
            if (score < t.minConf) return 'ignore';
            if (box.width >= t.reliableW && box.height >= t.reliableH && score >= 0.5) return 'reliable';
            return 'distant';
        }

        function matchDetections(rawDetections) {
            const now = performance.now();

            // 1) 过滤
            const valid = [];
            for (const det of rawDetections) {
                const box = det.boundingBox;
                const score = det.categories?.[0]?.score ?? 0;
                const cls = classifyDetection(box, score);
                if (cls === 'ignore') continue;
                valid.push({ box: det.boundingBox, score, keypoints: det.keypoints || null, _class: cls });
            }

            // 2) 匹配已有 track
            const matched = new Set();
            const updated = [];

            for (const track of trackedFaces) {
                let bestIoU = 0.3;
                let bestIdx = -1;
                for (let i = 0; i < valid.length; i++) {
                    if (matched.has(i)) continue;
                    const iouVal = iou(track.box, valid[i].box);
                    if (iouVal > bestIoU) { bestIoU = iouVal; bestIdx = i; }
                }
                if (bestIdx >= 0) {
                    matched.add(bestIdx);
                    const v = valid[bestIdx];
                    track.box = smoothBox(track.box, v.box);
                    track.score = v.score;
                    track.keypoints = v.keypoints;
                    track._class = v._class;
                    track.confirmed = Math.min(track.confirmed + 1, CONFIRM_FRAMES);
                    track.lost = 0;
                    updated.push(track);
                } else {
                    track.lost++;
                    if (track.lost <= LOST_FRAMES) updated.push(track);
                }
            }

            // 3) 新建 track
            for (let i = 0; i < valid.length; i++) {
                if (matched.has(i)) continue;
                const v = valid[i];
                updated.push({
                    id: nextFaceId++,
                    box: { originX: v.box.originX, originY: v.box.originY, width: v.box.width, height: v.box.height },
                    score: v.score,
                    keypoints: v.keypoints,
                    _class: v._class,
                    confirmed: 1,
                    lost: 0,
                });
            }

            trackedFaces = updated;
            return trackedFaces.filter(t => t.confirmed >= CONFIRM_FRAMES);
        }

        // ---- 绘制单个检测框（轻量：方案B 仅四角线） ----
        function drawOneDetection(track, displayWidth) {
            const box = track.box;
            const x = box.originX;
            const y = box.originY;
            const w = box.width;
            const h = box.height;
            const score = track.score;
            const tier = track._class || 'distant';
            const isReliable = tier === 'reliable';

            if (!showDetectionBox) return; // checkbox 关闭时只统计不画

            // 边框颜色：可靠=红，远距离=黄
            const lineColor = isReliable ? 'rgba(255, 82, 82, 0.75)' : 'rgba(253, 203, 110, 0.65)';
            const lineWidth = Math.max(1, Math.min(2, displayWidth / 700));

            // === 方案B：仅四角线，不画完整矩形 ===
            const cornerLen = Math.min(w, h) * 0.18;
            ctx.strokeStyle = lineColor;
            ctx.lineWidth = lineWidth;
            ctx.shadowColor = lineColor;
            ctx.shadowBlur = 2;

            [
                [x, y, 1, 1], [x + w, y, -1, 1],
                [x, y + h, 1, -1], [x + w, y + h, -1, -1]
            ].forEach(([cx, cy, dx, dy]) => {
                ctx.beginPath();
                ctx.moveTo(cx, cy + dy * cornerLen);
                ctx.lineTo(cx, cy);
                ctx.lineTo(cx + dx * cornerLen, cy);
                ctx.stroke();
            });
            ctx.shadowBlur = 0;

            // === 标签 ===
            let label;
            if (isReliable && track.headPose) {
                label = `${track.headPose.label} ${(score * 100).toFixed(0)}%`;
            } else if (isReliable) {
                label = `${(score * 100).toFixed(0)}%`;
            } else {
                label = `远距 ${(score * 100).toFixed(0)}%`;
            }

            ctx.font = '11px -apple-system, BlinkMacSystemFont, sans-serif';
            const textWidth = ctx.measureText(label).width;
            const textHeight = 14;
            const padding = 3;
            const labelY = y - 6;

            const bgColor = 'rgba(15, 15, 26, 0.55)';
            const textX = x + padding;

            if (labelY - textHeight > 0) {
                ctx.fillStyle = bgColor;
                ctx.fillRect(x, labelY - textHeight, textWidth + padding * 2, textHeight + padding);
                ctx.fillStyle = isReliable ? 'rgba(255, 255, 255, 0.85)' : 'rgba(253, 203, 110, 0.85)';
                ctx.fillText(label, textX, labelY - 3);
            } else {
                ctx.fillStyle = bgColor;
                ctx.fillRect(x, y + 1, textWidth + padding * 2, textHeight + padding);
                ctx.fillStyle = isReliable ? 'rgba(255, 255, 255, 0.85)' : 'rgba(253, 203, 110, 0.85)';
                ctx.fillText(label, textX, y + textHeight - 1);
            }

            // === 关键点：仅可靠人脸 + 显示检测框打开时 ===
            if (isReliable && track.keypoints && track.keypoints.length > 0) {
                track.keypoints.forEach((kp, idx) => {
                    let kpX = kp.x, kpY = kp.y;
                    if (kpX <= 1 && kpY <= 1 && (kpX > 0 || kpY > 0)) {
                        kpX *= canvas.width;
                        kpY *= canvas.height;
                    }
                    if (kpX === 0 && kpY === 0) return;

                    const pointRadius = 2;
                    ctx.beginPath();
                    ctx.arc(kpX, kpY, pointRadius, 0, 2 * Math.PI);
                    ctx.fillStyle = 'rgba(116, 185, 255, 0.7)';
                    ctx.fill();

                    // 标签：更小字体
                    const kpLabel = KEYPOINT_NAMES[idx];
                    if (kpLabel) {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                        ctx.font = '9px -apple-system, BlinkMacSystemFont, sans-serif';
                        ctx.fillText(kpLabel, kpX + 3, kpY + 1);
                    }
                });
            }
        }

        // ---- 主检测循环 ----
        async function detectAndDraw() {
            if (video.paused || video.ended) {
                requestAnimationFrame(detectAndDraw);
                return;
            }

            const displayWidth = video.videoWidth;
            const displayHeight = video.videoHeight;

            if (!displayWidth || !displayHeight) {
                requestAnimationFrame(detectAndDraw);
                return;
            }

            if (canvas.width !== displayWidth || canvas.height !== displayHeight) {
                canvas.width = displayWidth;
                canvas.height = displayHeight;
                console.log(`📐 canvas 尺寸更新: ${displayWidth}×${displayHeight}`);
            }

            debugVideoSize.textContent = `视频: ${displayWidth}×${displayHeight} | 模式: ${detectionMode === 'classroom' ? `${GRID_COLS}×${GRID_ROWS}分块` : '普通'}`;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const now = performance.now();
            let detections = [];

            if (detectionMode === 'classroom') {
                // ---- 大教室模式：节流 + 分块检测 ----
                if (now - lastDetectTime >= DETECT_INTERVAL_MS) {
                    lastDetectTime = now;
                    try {
                        detections = await detectGrid();
                        lastDetections = detections;
                    } catch (e) {
                        console.error('分块检测出错:', e.message || e);
                        detections = lastDetections;
                    }
                } else {
                    detections = lastDetections;
                }
            } else {
                // ---- 普通模式：整帧检测 ----
                try {
                    const fullCanvas = document.createElement('canvas');
                    videoToCanvas(fullCanvas);
                    const result = await detectOnCanvas(fullCanvas);
                    detections = result.detections || [];
                } catch (e) {
                    console.error('检测出错:', e.message || e);
                }
            }

            // === 跟踪管道：过滤 + 平滑 + 去抖 ===
            const confirmedFaces = matchDetections(detections);

            // === Face Landmarker：仅可靠人脸 ≥100px ===
            const fullCanvas = document.createElement('canvas');
            let fullCanvasReady = false;
            for (const face of confirmedFaces) {
                if (face._class === 'reliable' && face.box.width >= 100 && face.box.height >= 100) {
                    if (!fullCanvasReady) {
                        videoToCanvas(fullCanvas);
                        fullCanvasReady = true;
                    }
                    face.headPose = await runFaceLandmarker(fullCanvas, face.box);
                } else {
                    face.headPose = null;
                }
            }

            const reliableFaces = confirmedFaces.filter(f => f._class === 'reliable');
            const distantFaces = confirmedFaces.filter(f => f._class === 'distant');

            // 调试日志
            if (now - debugLastLog >= 1000) {
                console.log(`🔍 [${detectionMode}] 原始: ${detections.length} | 跟踪确认: ${confirmedFaces.length} (可靠: ${reliableFaces.length}, 远距: ${distantFaces.length})`);
                confirmedFaces.forEach((t, i) => {
                    const hp = t.headPose ? ` [${t.headPose.label} p${t.headPose.pitchRatio}]` : '';
                    console.log(`  人脸 ${i + 1}: ${t._class}${hp} 置信度 ${(t.score * 100).toFixed(1)}% 框 ${Math.round(t.box.width)}×${Math.round(t.box.height)} 确认${t.confirmed}帧`);
                });
                debugLastLog = now;
            }

            if (confirmedFaces.length > 0) {
                lastConfidence = confirmedFaces[0].score;
            } else {
                lastConfidence = null;
            }
            debugLastScore.textContent = `最后置信度: ${lastConfidence ? (lastConfidence * 100).toFixed(0) + '%' : '--'}`;

            // 绘制（仅已确认的跟踪人脸）
            confirmedFaces.forEach(t => drawOneDetection(t, displayWidth));

            // 更新 UI：人数 + 头部姿态概要
            const withPose = confirmedFaces.filter(f => f.headPose && f.headPose.state !== 'normal');
            const downCount = withPose.filter(f => f.headPose.state === 'down').length;
            const upCount = withPose.filter(f => f.headPose.state === 'up').length;
            let faceSummary = `检测到: ${confirmedFaces.length} 人`;
            if (reliableFaces.length > 0) faceSummary += ` (清晰${reliableFaces.length}`;
            if (downCount > 0) faceSummary += ` 低头${downCount}`;
            if (upCount > 0) faceSummary += ` 抬头${upCount}`;
            if (reliableFaces.length > 0) faceSummary += ')';
            faceCountEl.textContent = faceSummary;
            updateClassroomStatus(confirmedFaces.length);

            frameCount++;
            if (now - lastTime >= 1000) {
                fps = Math.round(frameCount / ((now - lastTime) / 1000));
                frameCount = 0;
                lastTime = now;
                fpsEl.textContent = `FPS: ${fps}`;
            }

            requestAnimationFrame(detectAndDraw);
        }

        // ---- 模式切换 ----
        modeToggleBtn.addEventListener('click', () => {
            if (detectionMode === 'normal') {
                detectionMode = 'classroom';
                modeToggleBtn.textContent = '🏫 大教室模式';
                modeToggleBtn.classList.add('classroom');
                lastDetections = [];
                lastDetectTime = 0;
                trackedFaces = [];
                console.log('🔀 切换为大教室模式（3×2分块 | 最小45px | 置信度≥0.35 | 远距离仅统计人数）');
            } else {
                detectionMode = 'normal';
                modeToggleBtn.textContent = '🏫 普通模式';
                modeToggleBtn.classList.remove('classroom');
                lastDetections = [];
                trackedFaces = [];
                console.log('🔀 切换为普通模式（整帧 | 最小70px | 置信度≥0.5 | 近距离显示五官）');
            }
        });

        // ========== 事件监听 ==========
        cameraSelect.addEventListener('change', async () => {
            statusEl.textContent = '⏳ 切换摄像头...';
            statusEl.className = 'status loading';
            try {
                await startCamera(cameraSelect.value);
                statusEl.textContent = '✅ 检测中';
                statusEl.className = 'status ready';
            } catch (e) { /* 已在 startCamera 处理 */ }
        });

        mirrorCheckbox.addEventListener('change', applyMirror);

        showBoxCheckbox.addEventListener('change', () => {
            showDetectionBox = showBoxCheckbox.checked;
            console.log(`👁 显示检测框: ${showDetectionBox ? '开启' : '关闭（仅统计人数）'}`);
        });

        retryCameraBtn.addEventListener('click', async () => {
            try {
                statusEl.textContent = '⏳ 正在重新请求摄像头...';
                statusEl.className = 'status loading';
                await startCamera(cameraSelect.value);
                permissionHelp.classList.remove('visible');
                statusEl.textContent = '✅ 检测中';
                statusEl.className = 'status ready';
                if (!detectLoopStarted) {
                    detectLoopStarted = true;
                    detectAndDraw();
                }
            } catch (err) {
                console.error('重新请求摄像头失败:', err);
                showCameraError(err);
            }
        });

        // ========== 主流程 ==========
        (async function main() {
            try {
                const cameras = await enumerateCameras();
                if (cameras.length === 0) {
                    statusEl.textContent = '⚠️ 未检测到摄像头设备';
                    statusEl.className = 'status error';
                    return;
                }

                const selectedId = cameraSelect.value;
                statusEl.textContent = '⏳ 下载AI模型中...';
                await Promise.all([loadModels(), startCamera(selectedId)]);

                applyMirror();
                permissionHelp.classList.remove('visible');
                statusEl.textContent = '✅ 检测中';
                statusEl.className = 'status ready';

                if (!detectLoopStarted) {
                    detectLoopStarted = true;
                    detectAndDraw();
                }
            } catch (err) {
                console.error('初始化失败:', err);
                showCameraError(err);
            }
        })();
    </script>
</body>
