<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时人脸检测</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #0f0f1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #e0e0e0;
            padding: 20px;
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 8px;
            color: #e94560;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 16px;
        }

        /* ---- 摄像头选择 ---- */
        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls label {
            font-size: 0.85rem;
            color: #aaa;
        }

        #cameraSelect {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #16213e;
            color: #e0e0e0;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            min-width: 200px;
        }

        #cameraSelect:focus {
            border-color: #e94560;
        }

        .mirror-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #aaa;
            cursor: pointer;
            user-select: none;
        }

        .mirror-toggle input {
            accent-color: #e94560;
            width: 16px;
            height: 16px;
        }

        /* ---- 画面容器 ---- */
        .container {
            position: relative;
            width: 100%;
            max-width: 960px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            background: #000;
        }

        #video {
            position: relative;
            z-index: 1;
            width: 100%;
            display: block;
        }

        #video.mirrored {
            transform: scaleX(-1);
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        #canvas.mirrored {
            transform: scaleX(-1);
        }

        /* ---- 信息栏 ---- */
        .info-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .status {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s;
        }

        .status.loading {
            background: #2d3436;
            color: #dfe6e9;
        }

        .status.ready {
            background: #00b894;
            color: #fff;
        }

        .status.error {
            background: #d63031;
            color: #fff;
        }

        .face-count {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            background: #16213e;
            color: #e94560;
            font-weight: 600;
        }

        .fps {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            background: #16213e;
            color: #74b9ff;
        }

        .classroom-status {
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }

        .classroom-status.present {
            background: #00b894;
            color: #fff;
        }

        .classroom-status.away {
            background: #636e72;
            color: #fff;
        }

        .classroom-status.multi {
            background: #fdcb6e;
            color: #2d3436;
        }

        .state-duration {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            background: #16213e;
            color: #a29bfe;
        }

        .permission-help {
            display: none;
            max-width: 720px;
            margin-top: 14px;
            padding: 12px 14px;
            border: 1px solid rgba(233, 69, 96, 0.35);
            border-radius: 10px;
            background: rgba(22, 33, 62, 0.9);
            color: #dfe6e9;
            font-size: 0.86rem;
            line-height: 1.6;
        }

        .permission-help.visible {
            display: block;
        }

        .retry-button {
            margin-top: 10px;
            padding: 8px 14px;
            border: 0;
            border-radius: 8px;
            background: #e94560;
            color: #fff;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }

        .retry-button:hover {
            background: #ff5c76;
        }

        /* ---- 调试信息 ---- */
        .debug-info {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
            font-size: 0.75rem;
            color: #888;
        }

        .debug-info span {
            padding: 3px 10px;
            border-radius: 10px;
            background: rgba(22, 33, 62, 0.6);
        }
    </style>
</head>
<body>
    <h1>🔴 实时人脸检测</h1>
    <p class="subtitle">请允许浏览器访问摄像头</p>

    <!-- 摄像头选择 + 镜像开关 -->
    <div class="controls">
        <label for="cameraSelect">📷 摄像头：</label>
        <select id="cameraSelect">
            <option value="">正在枚举设备...</option>
        </select>
        <label class="mirror-toggle">
            <input type="checkbox" id="mirrorCheckbox" checked>
            🪞 镜像翻转
        </label>
    </div>

    <div class="container">
        <video id="video" class="mirrored" autoplay muted playsinline></video>
        <canvas id="canvas" class="mirrored"></canvas>
    </div>

    <div class="info-bar">
        <span class="status loading" id="status">⏳ 加载模型中...</span>
        <span class="face-count" id="faceCount">检测到: 0 人</span>
        <span class="classroom-status away" id="classroomStatus">课堂状态：离开</span>
        <span class="state-duration" id="stateDuration">持续：--</span>
        <span class="fps" id="fps">FPS: --</span>
    </div>

    <!-- 调试信息 -->
    <div class="debug-info" id="debugInfo">
        <span id="debugVideoSize">视频: --</span>
        <span id="debugLastScore">最后置信度: --</span>
        <span id="debugEngine">引擎: MediaPipe</span>
    </div>

    <div class="permission-help" id="permissionHelp">
        摄像头权限被浏览器拒绝了。请点击地址栏左侧的网站权限图标，把摄像头改为“允许”，然后刷新页面或点击下面按钮。
        <br>
        如果仍然失败，请到 macOS“系统设置 → 隐私与安全性 → 摄像头”里允许当前浏览器访问摄像头。
        <br>
        <button class="retry-button" id="retryCameraBtn">重新请求摄像头</button>
    </div>

    <!-- MediaPipe Tasks Vision -->
    <script type="module">
        import { FaceDetector, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest";

        // ========== DOM 元素 ==========
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const statusEl = document.getElementById('status');
        const faceCountEl = document.getElementById('faceCount');
        const fpsEl = document.getElementById('fps');
        const cameraSelect = document.getElementById('cameraSelect');
        const mirrorCheckbox = document.getElementById('mirrorCheckbox');
        const permissionHelp = document.getElementById('permissionHelp');
        const retryCameraBtn = document.getElementById('retryCameraBtn');
        const classroomStatusEl = document.getElementById('classroomStatus');
        const stateDurationEl = document.getElementById('stateDuration');
        const debugVideoSize = document.getElementById('debugVideoSize');
        const debugLastScore = document.getElementById('debugLastScore');
        const debugEngine = document.getElementById('debugEngine');

        // ========== MediaPipe 配置 ==========
        const WASM_URL = "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm";
        const MODEL_URL = "https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/latest/blaze_face_short_range.tflite";

        // ========== 全局状态 ==========
        let faceDetector = null;
        let currentStream = null;
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 0;
        let detectLoopStarted = false;

        // 课堂状态追踪
        let noFaceSince = null;
        const AWAY_THRESHOLD_MS = 3000;

        // 状态时长追踪
        let currentClassroomState = 'away';
        let stateChangedAt = Date.now();

        // 调试
        let debugLastLog = 0;
        let lastConfidence = null;

        // ========== 课堂状态 ==========
        function updateClassroomStatus(faceCount) {
            let state;

            if (faceCount >= 2) {
                state = 'multi';
                noFaceSince = null;
            } else if (faceCount === 1) {
                state = 'present';
                noFaceSince = null;
            } else {
                const now = performance.now();
                if (noFaceSince === null) noFaceSince = now;
                if (now - noFaceSince >= AWAY_THRESHOLD_MS) {
                    state = 'away';
                } else {
                    return;
                }
            }

            if (classroomStatusEl.dataset.state !== state) {
                classroomStatusEl.dataset.state = state;
                classroomStatusEl.className = 'classroom-status ' + state;
                const labels = { present: '课堂状态：在座', away: '课堂状态：离开', multi: '课堂状态：多人' };
                classroomStatusEl.textContent = labels[state];
                currentClassroomState = state;
                stateChangedAt = Date.now();
                updateDurationDisplay();
            }
        }

        function updateDurationDisplay() {
            const elapsed = Math.floor((Date.now() - stateChangedAt) / 1000);
            const mm = Math.floor(elapsed / 60);
            const ss = elapsed % 60;
            stateDurationEl.textContent = `持续：${mm}分${String(ss).padStart(2, '0')}秒`;
        }

        // ========== 摄像头 ==========
        function showCameraError(err) {
            const isPermissionDenied = err && (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError');
            statusEl.textContent = isPermissionDenied
                ? '❌ 摄像头权限被拒绝'
                : '❌ 无法访问摄像头: ' + (err && err.message ? err.message : '未知错误');
            statusEl.className = 'status error';
            permissionHelp.classList.add('visible');
        }

        async function enumerateCameras() {
            try {
                const tempStream = await navigator.mediaDevices.getUserMedia({ video: true });
                tempStream.getTracks().forEach(t => t.stop());
            } catch (e) {
                console.error('请求摄像头权限失败:', e);
                showCameraError(e);
            }

            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoInputs = devices.filter(d => d.kind === 'videoinput');

            console.log(`🔍 找到 ${videoInputs.length} 个视频设备:`);
            videoInputs.forEach((d, i) => {
                console.log(`  [${i}] label="${d.label}" deviceId="${d.deviceId.slice(0, 30)}..." groupId="${d.groupId}"`);
            });

            cameraSelect.innerHTML = '';
            if (videoInputs.length === 0) {
                cameraSelect.innerHTML = '<option value="">未检测到摄像头</option>';
                return [];
            }

            videoInputs.forEach((device, i) => {
                const option = document.createElement('option');
                option.value = device.deviceId;
                option.textContent = device.label || `摄像头 ${i + 1}`;
                cameraSelect.appendChild(option);
            });

            const externalCam = videoInputs.find(d =>
                d.label && !d.label.toLowerCase().includes('built-in') && !d.label.includes('内建')
            );
            if (externalCam) {
                cameraSelect.value = externalCam.deviceId;
                console.log('✅ 自动选择外接相机:', externalCam.label);
            }

            return videoInputs;
        }

        async function startCamera(deviceId) {
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
                currentStream = null;
            }

            const constraints = {
                video: {
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            };
            if (deviceId) constraints.video.deviceId = { exact: deviceId };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                currentStream = stream;
                video.srcObject = stream;
                return new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve();
                    };
                });
            } catch (err) {
                showCameraError(err);
                throw err;
            }
        }

        function applyMirror() {
            const mirrored = mirrorCheckbox.checked;
            if (mirrored) {
                video.classList.add('mirrored');
                canvas.classList.add('mirrored');
            } else {
                video.classList.remove('mirrored');
                canvas.classList.remove('mirrored');
            }
        }

        // ========== 加载 MediaPipe 模型 ==========
        async function loadModels() {
            console.log('🔧 初始化 MediaPipe WASM...');
            const vision = await FilesetResolver.forVisionTasks(WASM_URL);
            console.log('✅ WASM 运行时就绪');

            // 尝试 GPU，失败则降级 CPU
            let delegate = 'GPU';
            try {
                faceDetector = await FaceDetector.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: MODEL_URL,
                        delegate: 'GPU'
                    },
                    runningMode: 'VIDEO',
                    minDetectionConfidence: 0.3
                });
            } catch (gpuErr) {
                console.warn('⚠️ GPU 不可用，降级为 CPU:', gpuErr.message || gpuErr);
                delegate = 'CPU';
                faceDetector = await FaceDetector.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: MODEL_URL,
                        delegate: 'CPU'
                    },
                    runningMode: 'VIDEO',
                    minDetectionConfidence: 0.3
                });
            }

            debugEngine.textContent = `引擎: MediaPipe (${delegate})`;
            console.log(`✅ 模型加载成功 (${delegate})`);
        }

        // ========== 人脸检测 + 绘制 ==========
        // 6 关键点名称（blaze_face_short_range）
        const KEYPOINT_NAMES = ['左眼', '右眼', '鼻尖', '嘴', '左耳', '右耳'];
        const KEYPOINT_COLORS = ['#00e5ff', '#00e5ff', '#ffea00', '#ff6d00', '#76ff03', '#76ff03'];

        async function detectAndDraw() {
            if (video.paused || video.ended) {
                requestAnimationFrame(detectAndDraw);
                return;
            }

            const displayWidth = video.videoWidth;
            const displayHeight = video.videoHeight;

            if (!displayWidth || !displayHeight) {
                requestAnimationFrame(detectAndDraw);
                return;
            }

            if (canvas.width !== displayWidth || canvas.height !== displayHeight) {
                canvas.width = displayWidth;
                canvas.height = displayHeight;
                console.log(`📐 canvas 尺寸更新: ${displayWidth}×${displayHeight}`);
            }

            // 调试：更新视频尺寸
            debugVideoSize.textContent = `视频: ${displayWidth}×${displayHeight}`;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // === MediaPipe 检测 ===
            let detections = [];
            const now = performance.now();
            try {
                if (faceDetector) {
                    const result = faceDetector.detectForVideo(video, now);
                    if (result && result.detections) {
                        detections = result.detections;
                    }
                }
            } catch (e) {
                console.error('人脸检测出错:', e.message || e);
            }

            // 每秒调试日志
            if (now - debugLastLog >= 1000) {
                console.log(`🔍 检测到人脸数量: ${detections.length}`);
                detections.forEach((det, i) => {
                    const score = det.categories && det.categories[0] ? det.categories[0].score : '?';
                    console.log(`  人脸 ${i + 1}: 置信度 ${(score * 100).toFixed(1)}%, 位置 (${Math.round(det.boundingBox.originX)}, ${Math.round(det.boundingBox.originY)}), 大小 ${Math.round(det.boundingBox.width)}×${Math.round(det.boundingBox.height)}`);
                });
                debugLastLog = now;
            }

            // 更新最后一次置信度
            if (detections.length > 0 && detections[0].categories && detections[0].categories[0]) {
                lastConfidence = detections[0].categories[0].score;
            } else if (detections.length === 0) {
                lastConfidence = null;
            }
            debugLastScore.textContent = `最后置信度: ${lastConfidence ? (lastConfidence * 100).toFixed(0) + '%' : '--'}`;

            // === 绘制每个检测到的人脸 ===
            detections.forEach(det => {
                const box = det.boundingBox;
                const x = box.originX;
                const y = box.originY;
                const w = box.width;
                const h = box.height;
                const score = det.categories && det.categories[0] ? det.categories[0].score : 0;

                // 红色发光边框
                ctx.strokeStyle = '#ff1744';
                ctx.lineWidth = Math.max(3, displayWidth / 200);
                ctx.shadowColor = '#ff1744';
                ctx.shadowBlur = 12;
                ctx.strokeRect(x, y, w, h);
                ctx.shadowBlur = 0;

                // 四角加强标记
                const cornerLen = Math.min(w, h) * 0.25;
                ctx.strokeStyle = '#ff5252';
                ctx.lineWidth = Math.max(4, displayWidth / 130);
                [
                    [x, y, 1, 1],
                    [x + w, y, -1, 1],
                    [x, y + h, 1, -1],
                    [x + w, y + h, -1, -1]
                ].forEach(([cx, cy, dx, dy]) => {
                    ctx.beginPath();
                    ctx.moveTo(cx, cy + dy * cornerLen);
                    ctx.lineTo(cx, cy);
                    ctx.lineTo(cx + dx * cornerLen, cy);
                    ctx.stroke();
                });

                // 置信度标签
                const label = `Face ${(score * 100).toFixed(0)}%`;
                const fontSize = Math.max(12, displayWidth / 60);
                ctx.font = `${fontSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
                const textMetrics = ctx.measureText(label);
                const textWidth = textMetrics.width;
                const textHeight = fontSize + 4;
                const padding = 4;
                const labelY = y - 8;

                if (labelY - textHeight > 0) {
                    ctx.fillStyle = 'rgba(255, 23, 68, 0.85)';
                    ctx.fillRect(x, labelY - textHeight, textWidth + padding * 2, textHeight + padding);
                    ctx.fillStyle = '#fff';
                    ctx.fillText(label, x + padding, labelY - 4);
                } else {
                    // 框太靠上，标签放框内顶部
                    ctx.fillStyle = 'rgba(255, 23, 68, 0.85)';
                    ctx.fillRect(x, y + 2, textWidth + padding * 2, textHeight + padding);
                    ctx.fillStyle = '#fff';
                    ctx.fillText(label, x + padding, y + textHeight);
                }

                // === 绘制 6 个关键点 ===
                if (det.keypoints && det.keypoints.length > 0) {
                    const kpScaleX = canvas.width;
                    const kpScaleY = canvas.height;

                    det.keypoints.forEach((kp, idx) => {
                        // MediaPipe keypoints 可能是 0-1 归一化坐标，也可能是像素坐标
                        let kpX = kp.x;
                        let kpY = kp.y;
                        // 判断：如果在 0-1 范围内，视为归一化坐标
                        if (kpX <= 1 && kpY <= 1) {
                            kpX *= kpScaleX;
                            kpY *= kpScaleY;
                        }

                        if (kpX === 0 && kpY === 0) return; // 跳过无效点

                        const pointSize = Math.max(3, displayWidth / 350);

                        // 外圈发光
                        ctx.beginPath();
                        ctx.arc(kpX, kpY, pointSize + 2, 0, 2 * Math.PI);
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                        ctx.fill();

                        // 内圈彩色
                        ctx.beginPath();
                        ctx.arc(kpX, kpY, pointSize, 0, 2 * Math.PI);
                        ctx.fillStyle = KEYPOINT_COLORS[idx] || '#fff';
                        ctx.fill();

                        // 标签
                        const kpLabel = KEYPOINT_NAMES[idx];
                        if (kpLabel) {
                            ctx.fillStyle = '#fff';
                            ctx.font = `${Math.max(9, displayWidth / 90)}px -apple-system, BlinkMacSystemFont, sans-serif`;
                            ctx.shadowColor = 'rgba(0,0,0,0.8)';
                            ctx.shadowBlur = 3;
                            ctx.fillText(kpLabel, kpX + pointSize + 4, kpY + pointSize / 2);
                            ctx.shadowBlur = 0;
                        }
                    });
                }
            });

            // 更新 UI
            faceCountEl.textContent = `检测到: ${detections.length} 人`;
            updateClassroomStatus(detections.length);

            frameCount++;
            if (now - lastTime >= 1000) {
                fps = Math.round(frameCount / ((now - lastTime) / 1000));
                frameCount = 0;
                lastTime = now;
                fpsEl.textContent = `FPS: ${fps}`;
            }

            requestAnimationFrame(detectAndDraw);
        }

        // ========== 事件监听 ==========
        cameraSelect.addEventListener('change', async () => {
            statusEl.textContent = '⏳ 切换摄像头...';
            statusEl.className = 'status loading';
            try {
                await startCamera(cameraSelect.value);
                statusEl.textContent = '✅ 检测中';
                statusEl.className = 'status ready';
            } catch (e) { /* 已在 startCamera 处理 */ }
        });

        mirrorCheckbox.addEventListener('change', applyMirror);
        setInterval(updateDurationDisplay, 1000);

        retryCameraBtn.addEventListener('click', async () => {
            try {
                statusEl.textContent = '⏳ 正在重新请求摄像头...';
                statusEl.className = 'status loading';
                await startCamera(cameraSelect.value);
                permissionHelp.classList.remove('visible');
                statusEl.textContent = '✅ 检测中';
                statusEl.className = 'status ready';
                if (!detectLoopStarted) {
                    detectLoopStarted = true;
                    detectAndDraw();
                }
            } catch (err) {
                console.error('重新请求摄像头失败:', err);
                showCameraError(err);
            }
        });

        // ========== 主流程 ==========
        (async function main() {
            try {
                const cameras = await enumerateCameras();
                if (cameras.length === 0) {
                    statusEl.textContent = '⚠️ 未检测到摄像头设备';
                    statusEl.className = 'status error';
                    return;
                }

                const selectedId = cameraSelect.value;
                statusEl.textContent = '⏳ 下载AI模型中...';
                await Promise.all([loadModels(), startCamera(selectedId)]);

                applyMirror();
                permissionHelp.classList.remove('visible');
                statusEl.textContent = '✅ 检测中';
                statusEl.className = 'status ready';

                if (!detectLoopStarted) {
                    detectLoopStarted = true;
                    detectAndDraw();
                }
            } catch (err) {
                console.error('初始化失败:', err);
                showCameraError(err);
            }
        })();
    </script>
</body>
</html>
