<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时人脸检测</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #0f0f1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #e0e0e0;
            padding: 20px;
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 8px;
            color: #e94560;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 16px;
        }

        /* ---- 摄像头选择 ---- */
        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls label {
            font-size: 0.85rem;
            color: #aaa;
        }

        #cameraSelect {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #16213e;
            color: #e0e0e0;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            min-width: 200px;
        }

        #cameraSelect:focus {
            border-color: #e94560;
        }

        .stream-input {
            width: min(52vw, 420px);
            min-width: 260px;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #10182d;
            color: #e0e0e0;
            font-size: 0.85rem;
            outline: none;
        }

        .stream-input:focus {
            border-color: #74b9ff;
        }

        .source-status {
            padding: 5px 10px;
            border-radius: 8px;
            background: rgba(116, 185, 255, 0.14);
            color: #74b9ff;
            font-size: 0.78rem;
            white-space: nowrap;
        }

        .mirror-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #aaa;
            cursor: pointer;
            user-select: none;
        }

        .mirror-toggle input {
            accent-color: #e94560;
            width: 16px;
            height: 16px;
        }

        .mode-toggle {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #16213e;
            color: #74b9ff;
            font-size: 0.85rem;
            cursor: pointer;
            user-select: none;
            transition: all 0.3s;
        }

        .mode-toggle:hover {
            border-color: #74b9ff;
        }

        .mode-toggle.primary {
            background: #e94560;
            color: #fff;
            border-color: #e94560;
        }

        .mode-toggle.classroom {
            background: #fdcb6e;
            color: #2d3436;
            border-color: #fdcb6e;
            font-weight: 600;
        }

        /* ---- 画面容器 ---- */
        .container {
            position: relative;
            width: min(96vw, 1100px);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            background: #000;
        }

        #video {
            position: relative;
            z-index: 1;
            display: block;
            width: 100%;
            height: auto;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* ---- 信息栏 ---- */
        .info-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .status {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s;
        }

        .status.loading {
            background: #2d3436;
            color: #dfe6e9;
        }

        .status.ready {
            background: #00b894;
            color: #fff;
        }

        .status.error {
            background: #d63031;
            color: #fff;
        }

        .face-count {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            background: #16213e;
            color: #e94560;
            font-weight: 600;
        }

        .fps {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            background: #16213e;
            color: #74b9ff;
        }

        .classroom-status {
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }

        .classroom-status.present {
            background: #00b894;
            color: #fff;
        }

        .classroom-status.away {
            background: #636e72;
            color: #fff;
        }

        .classroom-status.multi {
            background: #fdcb6e;
            color: #2d3436;
        }

        .state-duration {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            background: #16213e;
            color: #a29bfe;
        }

        .permission-help {
            display: none;
            max-width: 720px;
            margin-top: 14px;
            padding: 12px 14px;
            border: 1px solid rgba(233, 69, 96, 0.35);
            border-radius: 10px;
            background: rgba(22, 33, 62, 0.9);
            color: #dfe6e9;
            font-size: 0.86rem;
            line-height: 1.6;
        }

        .permission-help.visible {
            display: block;
        }

        .retry-button {
            margin-top: 10px;
            padding: 8px 14px;
            border: 0;
            border-radius: 8px;
            background: #e94560;
            color: #fff;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }

        .retry-button:hover {
            background: #ff5c76;
        }

        /* ---- 调试信息 ---- */
        .debug-info {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
            font-size: 0.75rem;
            color: #888;
        }

        .debug-info span {
            padding: 3px 10px;
            border-radius: 10px;
            background: rgba(22, 33, 62, 0.6);
        }

        .analytics-panel {
            width: min(96vw, 1100px);
            margin-top: 14px;
            padding: 14px;
            border: 1px solid rgba(116, 185, 255, 0.25);
            border-radius: 10px;
            background: rgba(22, 33, 62, 0.72);
        }

        .analytics-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .analytics-title {
            font-size: 0.92rem;
            font-weight: 700;
            color: #dfe6e9;
        }

        .analytics-summary {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 0.78rem;
        }

        .analytics-chip {
            padding: 4px 9px;
            border-radius: 8px;
            background: rgba(15, 15, 26, 0.72);
            color: #b2bec3;
        }

        .analytics-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.78rem;
        }

        .analytics-table th,
        .analytics-table td {
            padding: 7px 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            text-align: left;
            white-space: nowrap;
        }

        .analytics-table th {
            color: #74b9ff;
            font-weight: 600;
        }

        .analytics-table td {
            color: #dfe6e9;
        }

        .analytics-table .muted {
            color: #8d99a6;
        }
    </style>
</head>
<body>
    <h1>🔴 实时人脸检测</h1>
    <p class="subtitle">请允许浏览器访问摄像头</p>

    <!-- 摄像头选择 + 镜像开关 -->
    <div class="controls">
        <label for="cameraSelect">📷 摄像头：</label>
        <select id="cameraSelect">
            <option value="">正在枚举设备...</option>
        </select>
        <button class="mode-toggle" id="startCameraBtn" title="使用选中的本机摄像头">📷 使用摄像头</button>
        <button class="mode-toggle" id="modeToggleBtn" title="切换大教室分块检测模式">🏫 普通模式</button>
        <label class="mirror-toggle">
            <input type="checkbox" id="showBoxCheckbox" checked>
            👁 显示检测框
        </label>
        <span class="source-status" id="sourceStatus">输入源：摄像头</span>
    </div>

    <div class="controls">
        <label for="streamUrlInput">🌐 网络流：</label>
        <input
            class="stream-input"
            id="streamUrlInput"
            type="url"
            placeholder="填 HLS/HTTP 地址，例如 /Device/stream/stream.m3u8"
        >
        <button class="mode-toggle primary" id="startStreamBtn" title="打开网络视频流">▶ 打开网络流</button>
    </div>

    <div class="container">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="info-bar">
        <span class="status loading" id="status">⏳ 加载模型中...</span>
        <span class="face-count" id="faceCount">检测到: 0 人</span>
        <span class="classroom-status away" id="classroomStatus">课堂状态：离开</span>
        <span class="state-duration" id="stateDuration">持续：--</span>
        <span class="fps" id="fps">FPS: --</span>
    </div>

    <!-- 调试信息 -->
    <div class="debug-info" id="debugInfo">
        <span id="debugVideoSize">视频: --</span>
        <span id="debugLastScore">最后置信度: --</span>
        <span id="debugEngine">引擎: MediaPipe</span>
    </div>

    <div class="analytics-panel" id="analyticsPanel">
        <div class="analytics-header">
            <div class="analytics-title">状态统计</div>
            <div class="analytics-summary" id="stateSummary">
                <span class="analytics-chip">当前：0 人</span>
                <span class="analytics-chip">累计：0 人</span>
            </div>
        </div>
        <table class="analytics-table">
            <thead>
                <tr>
                    <th>人员</th>
                    <th>当前状态</th>
                    <th>抬头</th>
                    <th>看桌面</th>
                    <th>疑似睡觉</th>
                    <th>无法判断</th>
                    <th>可见总时长</th>
                </tr>
            </thead>
            <tbody id="personStatsBody">
                <tr><td colspan="7" class="muted">等待检测数据...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="permission-help" id="permissionHelp">
        摄像头权限被浏览器拒绝了。请点击地址栏左侧的网站权限图标，把摄像头改为“允许”，然后刷新页面或点击下面按钮。
        <br>
        如果仍然失败，请到 macOS“系统设置 → 隐私与安全性 → 摄像头”里允许当前浏览器访问摄像头。
        <br>
        <button class="retry-button" id="retryCameraBtn">重新请求摄像头</button>
    </div>

    <!-- MediaPipe Tasks Vision -->
    <script type="module">
        import { FaceDetector, FaceLandmarker, PoseLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest";
        import Hls from "https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.mjs";

        // ========== DOM 元素 ==========
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const statusEl = document.getElementById('status');
        const faceCountEl = document.getElementById('faceCount');
        const fpsEl = document.getElementById('fps');
        const cameraSelect = document.getElementById('cameraSelect');
        const permissionHelp = document.getElementById('permissionHelp');
        const retryCameraBtn = document.getElementById('retryCameraBtn');
        const classroomStatusEl = document.getElementById('classroomStatus');
        const stateDurationEl = document.getElementById('stateDuration');
        const debugVideoSize = document.getElementById('debugVideoSize');
        const debugLastScore = document.getElementById('debugLastScore');
        const debugEngine = document.getElementById('debugEngine');
        const modeToggleBtn = document.getElementById('modeToggleBtn');
        const showBoxCheckbox = document.getElementById('showBoxCheckbox');
        const startCameraBtn = document.getElementById('startCameraBtn');
        const streamUrlInput = document.getElementById('streamUrlInput');
        const startStreamBtn = document.getElementById('startStreamBtn');
        const sourceStatus = document.getElementById('sourceStatus');
        const stateSummaryEl = document.getElementById('stateSummary');
        const personStatsBody = document.getElementById('personStatsBody');

        // ========== MediaPipe 配置 ==========
        const WASM_URL = "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm";
        const MODEL_URL = "https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_full_range/float16/latest/blaze_face_full_range.tflite";
        const LANDMARKER_URL = "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task";
        const POSE_URL = "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/latest/pose_landmarker_lite.task";

        // ========== 全局状态 ==========
        let faceDetector = null;
        let faceLandmarker = null;
        let poseLandmarker = null;
        let currentStream = null;
        let currentHls = null;
        let currentInputSource = 'camera';
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 0;
        let detectLoopStarted = false;

        // 课堂状态追踪
        let noFaceSince = null;
        const AWAY_THRESHOLD_MS = 3000;

        // 状态时长追踪
        let currentClassroomState = 'away';
        let stateChangedAt = Date.now();
        let durationTimerStarted = false;

        // 检测模式：'normal' | 'classroom'
        // ---- 检测模式 ----
        let detectionMode = 'normal';
        const GRID_COLS = 4;
        const GRID_ROWS = 3;
        const DETECT_INTERVAL_MS = 700;
        const GRID_OVERLAP_RATIO = 0.18;
        const GRID_FACE_SCALE = 1.65;
        const GRID_POSE_SCALE = 1.45;
        const GRID_MAX_TILE_SIDE = 960;
        const GRID_TILES_PER_CYCLE = 3;
        const GRID_RESULT_TTL_MS = 2500;
        const POSE_DETECT_INTERVAL_MS = 1600;
        let lastDetectTime = 0;
        let lastDetections = [];
        let lastDetectionsTimestamp = 0;
        let rollingGridDetections = [];
        let gridTileCursor = 0;
        let gridCycleCount = 0;
        let lastPoseDetectTime = 0;
        let lastPoses = [];
        let lastPosesTimestamp = 0;
        const CACHE_MAX_AGE_MS = 2600; // 分块轮询时保留最近几轮结果

        // 尺寸阈值（按模式）
        function getFaceThresholds() {
            if (detectionMode === 'classroom') {
                return { minW: 16, minH: 16, reliableW: 64, reliableH: 64, minConf: 0.18 };
            }
            return { minW: 45, minH: 45, reliableW: 90, reliableH: 90, minConf: 0.45 };
        }

        // 跟踪状态：EMA 平滑 + 帧计数
        // trackedFaces: Map<id, { box, score, confirmed, lost, keypoints }>
        let trackedFaces = [];
        const CONFIRM_FRAMES = 3;   // 连续 3 帧才显示
        const LOST_FRAMES = 5;      // 连续 5 帧丢失才移除
        const EMA_ALPHA = 0.3;      // x/y 平滑系数
        const EMA_SIZE_ALPHA = 0.7;  // w/h 平滑系数（更高=更快跟随变化）
        let debugRawDetection = true; // true=跳过跟踪直接画 raw box（调试用）
        let nextFaceId = 0;
        let showDetectionBox = true; // 显示检测框开关
        let latestStatusPayload = null;
        const DEVICE_ID = 'camera-01';
        const CLASS_ID = 1;
        const BACKEND_STATUS_ENDPOINT = ''; // 后端接口准备位，例如: http://localhost:8000/api/classroom/status
        const BACKEND_POST_INTERVAL_MS = 1000;
        let lastBackendPostAt = 0;

        // 数据统计：和画框/模型解耦，专门负责人数与每人状态时长
        const STUDY_STATES = ['抬头', '看桌面', '疑似睡觉', '无法判断'];
        const ANALYTICS_TRACK_TTL_MS = 30000;
        const ANALYTICS_MATCH_IOU = 0.12;
        const ANALYTICS_RENDER_INTERVAL_MS = 1000;
        let analyticsTracks = [];
        let nextAnalyticsId = 1;
        let latestAnalyticsSnapshot = null;
        let lastAnalyticsRenderAt = 0;

        // 调试
        let debugLastLog = 0;
        let lastConfidence = null;

        // ========== 课堂状态 ==========
        function updateClassroomStatus(faceCount) {
            let state;

            if (faceCount >= 2) {
                state = 'multi';
                noFaceSince = null;
            } else if (faceCount === 1) {
                state = 'present';
                noFaceSince = null;
            } else {
                const now = performance.now();
                if (noFaceSince === null) noFaceSince = now;
                if (now - noFaceSince >= AWAY_THRESHOLD_MS) {
                    state = 'away';
                } else {
                    return;
                }
            }

            if (classroomStatusEl.dataset.state !== state) {
                classroomStatusEl.dataset.state = state;
                classroomStatusEl.className = 'classroom-status ' + state;
                const labels = { present: '课堂状态：在座', away: '课堂状态：离开', multi: '课堂状态：多人' };
                classroomStatusEl.textContent = labels[state];
                currentClassroomState = state;
                stateChangedAt = Date.now();
                updateDurationDisplay();
            }
        }

        function updateDurationDisplay() {
            if (!stateChangedAt) {
                stateDurationEl.textContent = '持续：--';
                return;
            }
            const elapsed = Math.floor((Date.now() - stateChangedAt) / 1000);
            const mm = Math.floor(elapsed / 60);
            const ss = elapsed % 60;
            stateDurationEl.textContent = `持续：${mm}分${String(ss).padStart(2, '0')}秒`;
            console.log(`⏱ 持续时间刷新: ${mm}分${String(ss).padStart(2, '0')}秒 (stateChangedAt=${stateChangedAt})`);
        }

        // 立即启动持续时间刷新定时器（不依赖 main 异步流程）
        if (!durationTimerStarted) {
            durationTimerStarted = true;
            updateDurationDisplay();
            setInterval(updateDurationDisplay, 1000);
            console.log('✅ 持续时间定时器已启动');
        }

        // ========== 摄像头 ==========
        function showCameraError(err) {
            const isPermissionDenied = err && (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError');
            statusEl.textContent = isPermissionDenied
                ? '❌ 摄像头权限被拒绝'
                : '❌ 无法访问摄像头: ' + (err && err.message ? err.message : '未知错误');
            statusEl.className = 'status error';
            permissionHelp.classList.add('visible');
        }

        function resetDetectionState() {
            lastDetections = [];
            lastDetectionsTimestamp = 0;
            lastDetectTime = 0;
            rollingGridDetections = [];
            gridTileCursor = 0;
            gridCycleCount = 0;
            lastPoses = [];
            lastPosesTimestamp = 0;
            lastPoseDetectTime = 0;
            trackedFaces = [];
            analyticsTracks = [];
            nextAnalyticsId = 1;
            latestAnalyticsSnapshot = null;
            noFaceSince = null;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function stopCurrentVideoSource() {
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
                currentStream = null;
            }
            if (currentHls) {
                currentHls.destroy();
                currentHls = null;
            }
            video.pause();
            video.removeAttribute('src');
            video.srcObject = null;
            video.load();
        }

        function waitForVideoReady() {
            return new Promise((resolve, reject) => {
                const timeout = setTimeout(() => {
                    cleanup();
                    reject(new Error('视频加载超时'));
                }, 15000);

                function cleanup() {
                    clearTimeout(timeout);
                    video.removeEventListener('loadedmetadata', onReady);
                    video.removeEventListener('canplay', onReady);
                    video.removeEventListener('error', onError);
                }

                function onReady() {
                    cleanup();
                    video.play().then(resolve).catch(resolve);
                }

                function onError() {
                    cleanup();
                    reject(new Error('视频源无法播放，请检查地址、格式或跨域设置'));
                }

                if (video.readyState >= 2 && video.videoWidth > 0) {
                    onReady();
                    return;
                }

                video.addEventListener('loadedmetadata', onReady, { once: true });
                video.addEventListener('canplay', onReady, { once: true });
                video.addEventListener('error', onError, { once: true });
            });
        }

        function isHlsUrl(url) {
            return /\.m3u8($|\?)/i.test(url);
        }

        async function startNetworkStream(url) {
            const streamUrl = (url || '').trim();
            if (!streamUrl) throw new Error('请先输入网络视频流地址');
            if (/^rtsp:\/\//i.test(streamUrl)) {
                throw new Error('浏览器不能直接播放 RTSP。请先用 FFmpeg/VLC 转成 HLS，例如 /Device/stream/stream.m3u8');
            }

            stopCurrentVideoSource();
            resetDetectionState();
            video.crossOrigin = 'anonymous';
            video.muted = true;
            video.playsInline = true;

            if (isHlsUrl(streamUrl) && Hls.isSupported()) {
                currentHls = new Hls({
                    lowLatencyMode: true,
                    liveSyncDurationCount: 2,
                    maxLiveSyncPlaybackRate: 1.2
                });
                currentHls.loadSource(streamUrl);
                currentHls.attachMedia(video);
                currentHls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        console.error('HLS 播放错误:', data);
                        statusEl.textContent = '❌ 网络流播放失败';
                        statusEl.className = 'status error';
                    }
                });
            } else {
                video.src = streamUrl;
            }

            await waitForVideoReady();
            currentInputSource = 'stream';
            detectionMode = 'classroom';
            modeToggleBtn.textContent = '🏫 大教室模式';
            modeToggleBtn.classList.add('classroom');
            sourceStatus.textContent = '输入源：网络流';
            statusEl.textContent = '✅ 网络流检测中';
            statusEl.className = 'status ready';
            localStorage.setItem('classroomStreamUrl', streamUrl);
        }

        async function enumerateCameras() {
            try {
                const tempStream = await navigator.mediaDevices.getUserMedia({ video: true });
                tempStream.getTracks().forEach(t => t.stop());
            } catch (e) {
                console.error('请求摄像头权限失败:', e);
                showCameraError(e);
            }

            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoInputs = devices.filter(d => d.kind === 'videoinput');

            console.log(`🔍 找到 ${videoInputs.length} 个视频设备:`);
            videoInputs.forEach((d, i) => {
                console.log(`  [${i}] label="${d.label}" deviceId="${d.deviceId.slice(0, 30)}..." groupId="${d.groupId}"`);
            });

            cameraSelect.innerHTML = '';
            if (videoInputs.length === 0) {
                cameraSelect.innerHTML = '<option value="">未检测到摄像头</option>';

            }

            videoInputs.forEach((device, i) => {
                const option = document.createElement('option');
                option.value = device.deviceId;
                option.textContent = device.label || `摄像头 ${i + 1}`;

                d.label && !d.label.toLowerCase().includes('built-in') && !d.label.includes('内建')
            );
            if (externalCam) {
                cameraSelect.value = externalCam.deviceId;
                console.log('✅ 自动选择外接相机:', externalCam.label);
            }

            return videoInputs;
        }

        async function startCamera(deviceId) {
            stopCurrentVideoSource();
            resetDetectionState();
            video.removeAttribute('crossorigin');

            const constraints = {
                video: {
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                }
            };
            if (deviceId) constraints.video.deviceId = { exact: deviceId };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                currentStream = stream;
                video.srcObject = stream;
                currentInputSource = 'camera';
                sourceStatus.textContent = '输入源：摄像头';
                return new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();

        // ========== 加载 MediaPipe 模型 ==========
        async function loadModels() {
            console.log('🔧 初始化 MediaPipe WASM...');

        }

        // ========== 人脸检测 + 绘制 ==========
        // 6 关键点名称（blaze_face_short_range）
        const KEYPOINT_NAMES = ['左眼', '右眼', '鼻尖', '嘴', '左耳', '右耳'];
        const KEYPOINT_COLORS = ['#00e5ff', '#00e5ff', '#ffea00', '#ff6d00', '#76ff03', '#76ff03'];

        // Head pose estimation: landmark indices (Face Landmarker 468-point model)
        const LM_NOSE_TIP = 1;
        const LM_FOREHEAD = 10;     // glabella, between eyebrows
        const LM_CHIN = 152;        // lowest point on chin
        const LM_LEFT_EYE = 33;     // left eye outer corner
        const LM_RIGHT_EYE = 263;   // right eye outer corner

        // ---- 工具：video → canvas ----
        function videoToCanvas(targetCanvas) {
            const targetCtx = targetCanvas.getContext('2d', { willReadFrequently: true });
            targetCanvas.width = video.videoWidth;
            targetCanvas.height = video.videoHeight;
            targetCtx.drawImage(video, 0, 0);

        // ---- 工具：在 canvas 上检测人脸 ----
        async function detectOnCanvas(sourceCanvas) {
            if (!faceDetector) return { detections: [] };
            try {
                return faceDetector.detect(sourceCanvas);
            } catch (e) {
                console.error('检测出错:', e.message || e);
                return { detections: [] };
            }
        }

        function cloneDetectionWithBox(det, box, keypoints, meta = {}) {
            return {
                ...det,
                boundingBox: box,
                keypoints: keypoints || det.keypoints || null,
                ...meta
            };
        }

        function mapTileDetection(det, srcX, srcY, srcW, srcH, scale, row, col) {
            const box = det.boundingBox;
            const isNormalizedBox = box.width <= 1 && box.height <= 1;
            const mappedBox = isNormalizedBox
                ? {
                    originX: srcX + box.originX * srcW,
                    originY: srcY + box.originY * srcH,
                    width: box.width * srcW,
                    height: box.height * srcH
                }
                : {
                    originX: srcX + box.originX / scale,
                    originY: srcY + box.originY / scale,
                    width: box.width / scale,
                    height: box.height / scale
                };

            const mappedKeypoints = det.keypoints ? det.keypoints.map(kp => {
                if (kp.x <= 1 && kp.y <= 1) {
                    return { ...kp, x: srcX + kp.x * srcW, y: srcY + kp.y * srcH };
                }
                return { ...kp, x: srcX + kp.x / scale, y: srcY + kp.y / scale };
            }) : null;

            return cloneDetectionWithBox(det, mappedBox, mappedKeypoints, {
                _gridRow: row,
                _gridCol: col,
                _tileScale: scale,
                _source: 'tile'
            });
        }

        function getGridTiles(fullW, fullH) {
            const baseTileW = fullW / GRID_COLS;
            const baseTileH = fullH / GRID_ROWS;
            const overlapX = baseTileW * GRID_OVERLAP_RATIO;
            const overlapY = baseTileH * GRID_OVERLAP_RATIO;
            const tiles = [];

            for (let row = 0; row < GRID_ROWS; row++) {
                for (let col = 0; col < GRID_COLS; col++) {
                    const rawX = col * baseTileW - overlapX;
                    const rawY = row * baseTileH - overlapY;
                    const rawW = baseTileW + overlapX * 2;
                    const rawH = baseTileH + overlapY * 2;
                    const srcX = Math.max(0, Math.floor(rawX));
                    const srcY = Math.max(0, Math.floor(rawY));
                    const srcRight = Math.min(fullW, Math.ceil(rawX + rawW));
                    const srcBottom = Math.min(fullH, Math.ceil(rawY + rawH));
                    tiles.push({
                        row,
                        col,
                        srcX,
                        srcY,
                        srcW: Math.max(1, srcRight - srcX),
                        srcH: Math.max(1, srcBottom - srcY)
                    });
                }
            }

            return tiles;
        }

        // ---- 大教室模式：全图 + 重叠分块 + 放大检测 ----
        async function detectGrid(now) {
            const fullW = video.videoWidth;
            const fullH = video.videoHeight;
            if (!fullW || !fullH) return [];

            // 1) video → 全幅 canvas
            const fullCanvas = document.createElement('canvas');
            const fullCtx = fullCanvas.getContext('2d', { willReadFrequently: true });
            fullCanvas.width = fullW;
            fullCanvas.height = fullH;
            fullCtx.drawImage(video, 0, 0);

            const allDetections = [];
            const tiles = getGridTiles(fullW, fullH);

            // 全图检测低频跑，补近处/大脸；分块检测轮询跑，避免一次处理 12 个 tile 卡崩。
            if (gridCycleCount % 4 === 0) {
                const fullResult = await detectOnCanvas(fullCanvas);
                if (fullResult.detections) {
                    fullResult.detections.forEach(det => {
                        allDetections.push(cloneDetectionWithBox(det, { ...det.boundingBox }, det.keypoints, { _source: 'full', _seenAt: now }));
                    });
                }
            }

            const tilesThisCycle = [];
            for (let i = 0; i < Math.min(GRID_TILES_PER_CYCLE, tiles.length); i++) {
                tilesThisCycle.push(tiles[(gridTileCursor + i) % tiles.length]);
            }
            gridTileCursor = (gridTileCursor + GRID_TILES_PER_CYCLE) % tiles.length;
            gridCycleCount++;

            // 2) 逐步分块放大检测。小脸会在 tile 内变大，远景监控更容易检出。
            for (const tile of tilesThisCycle) {
                const scale = Math.min(GRID_FACE_SCALE, GRID_MAX_TILE_SIDE / Math.max(tile.srcW, tile.srcH));
                const scaledW = Math.max(1, Math.round(tile.srcW * scale));
                const scaledH = Math.max(1, Math.round(tile.srcH * scale));
                const tileCanvas = document.createElement('canvas');
                tileCanvas.width = scaledW;
                tileCanvas.height = scaledH;
                const tileCtx = tileCanvas.getContext('2d', { willReadFrequently: true });
                tileCtx.imageSmoothingEnabled = true;
                tileCtx.imageSmoothingQuality = 'medium';
                tileCtx.drawImage(fullCanvas, tile.srcX, tile.srcY, tile.srcW, tile.srcH, 0, 0, scaledW, scaledH);

                const result = await detectOnCanvas(tileCanvas);
                if (result.detections) {
                    for (const det of result.detections) {
                        allDetections.push({
                            ...mapTileDetection(det, tile.srcX, tile.srcY, tile.srcW, tile.srcH, scale, tile.row, tile.col),
                            _seenAt: now
                        });
                    }
                }
            }

            rollingGridDetections = rollingGridDetections
                .filter(det => now - (det._seenAt || 0) <= GRID_RESULT_TTL_MS)
                .concat(allDetections);

            // 3) 去重：合并最近几轮检测结果。这里不限制人数，只清理重复框和过期框。
            return mergeDetections(rollingGridDetections);
        }
