        function mergeDetections(detections) {
            if (detections.length <= 1) return detections;

            // 按置信度降序排列
            detections.sort((a, b) => {
                const sa = a.categories?.[0]?.score ?? 0;
                const sb = b.categories?.[0]?.score ?? 0;
                return sb - sa;
            });

            const merged = [];
            const suppressed = new Set();

            for (let i = 0; i < detections.length; i++) {
                if (suppressed.has(i)) continue;
                merged.push(detections[i]);
                const boxA = detections[i].boundingBox;

                for (let j = i + 1; j < detections.length; j++) {
                    if (suppressed.has(j)) continue;
                    const boxB = detections[j].boundingBox;

                    // 计算 IoU
                    const ax1 = boxA.originX, ay1 = boxA.originY;
                    const ax2 = ax1 + boxA.width, ay2 = ay1 + boxA.height;
                    const bx1 = boxB.originX, by1 = boxB.originY;
                    const bx2 = bx1 + boxB.width, by2 = by1 + boxB.height;

                    const interX = Math.max(0, Math.min(ax2, bx2) - Math.max(ax1, bx1));
                    const interY = Math.max(0, Math.min(ay2, by2) - Math.max(ay1, by1));
                    const interArea = interX * interY;
                    const unionArea = boxA.width * boxA.height + boxB.width * boxB.height - interArea;
                    const smallerArea = Math.min(boxA.width * boxA.height, boxB.width * boxB.height);

                    const overlap = unionArea > 0 ? interArea / unionArea : 0;
                    const containment = smallerArea > 0 ? interArea / smallerArea : 0;

                    if (overlap > 0.38 || containment > 0.72) {
                        suppressed.add(j);
                    }
                }
            }

            return merged;
        }

        // ========== 头部姿态估计（Face Landmarker） ==========
        function radToDeg(rad) {
            return rad * 180 / Math.PI;
        }

        function getMatrixData(matrix) {
            if (!matrix) return null;
            if (Array.isArray(matrix)) return matrix;
            if (matrix.data) return Array.from(matrix.data);
            if (matrix.matrix) return Array.from(matrix.matrix);
            return null;
        }

        function estimateHeadPoseFromMatrix(matrix) {
            const m = getMatrixData(matrix);
            if (!m || m.length < 16) return null;

            // MediaPipe facial transformation matrix is treated as row-major 4x4.
            // These Euler angles are used as a practical classroom-state signal,
            // not as a calibrated medical/biometric head-pose measurement.
            const r00 = m[0], r01 = m[1], r02 = m[2];
            const r10 = m[4], r11 = m[5], r12 = m[6];
            const r20 = m[8], r21 = m[9], r22 = m[10];

            const pitch = radToDeg(Math.atan2(-r21, r22));
            const yaw = radToDeg(Math.atan2(r20, Math.sqrt(r21 * r21 + r22 * r22)));
            const roll = radToDeg(Math.atan2(-r10, r00));

            if (![pitch, yaw, roll].every(Number.isFinite)) return null;

            let state = 'normal';
            if (pitch > 18) state = 'down';
            else if (pitch < -16) state = 'up';
            else if (Math.abs(yaw) > 32) state = 'side';

            return {
                source: 'face-matrix',
                pitch: Number(pitch.toFixed(1)),
                yaw: Number(yaw.toFixed(1)),
                roll: Number(roll.toFixed(1)),
                state,
                label: { down: '看桌面', up: '抬头', side: '侧脸', normal: '正常' }[state],
                confidence: Math.max(0, Math.min(1, 1 - Math.min(Math.abs(roll), 45) / 90))
            };
        }

        function estimateHeadPoseFromLandmarks(landmarks, matrix) {
            const matrixPose = estimateHeadPoseFromMatrix(matrix);

            if (!landmarks || landmarks.length < 264) return null;

            const nose = landmarks[LM_NOSE_TIP];
            const forehead = landmarks[LM_FOREHEAD];
            const chin = landmarks[LM_CHIN];
            const leftEye = landmarks[LM_LEFT_EYE];
            const rightEye = landmarks[LM_RIGHT_EYE];

            if (!nose || !forehead || !chin || !leftEye || !rightEye) return null;

            // 眼中心
            const eyeMidY = (leftEye.y + rightEye.y) / 2;

            // pitch 比率：鼻尖相对于眼-下巴的位置
            // 正常 ≈0.43，低头时鼻子靠近眼睛(↓)，抬头时鼻子远离(↑)
            const eyeToChin = chin.y - eyeMidY;
            const eyeToNose = nose.y - eyeMidY;
            const pitchRatio = eyeToChin > 0 ? eyeToNose / eyeToChin : 0;

            // yaw 估计：鼻尖水平偏移 vs 眼中心
            const eyeMidX = (leftEye.x + rightEye.x) / 2;
            const noseOffsetX = nose.x - eyeMidX;
            const eyeWidth = Math.abs(rightEye.x - leftEye.x);
            const yawRatio = eyeWidth > 0 ? noseOffsetX / eyeWidth : 0;

            let landmarkState;
            if (pitchRatio < 0.33) landmarkState = 'down';
            else if (pitchRatio > 0.52) landmarkState = 'up';
            else if (Math.abs(yawRatio) > 0.18) landmarkState = 'side';
            else landmarkState = 'normal';

            const landmarkPose = {
                source: 'face-landmarks-2d',
                pitchRatio: Number(pitchRatio.toFixed(2)),
                yawRatio: Number(yawRatio.toFixed(2)),
                state: landmarkState,
                label: { down: '看桌面', up: '抬头', side: '侧脸', normal: '正常' }[landmarkState],
                confidence: 0.65
            };

            if (!matrixPose) return landmarkPose;

            // Prefer the transformation matrix for clear faces. If the matrix is neutral
            // but the 2D geometry strongly says side/down, keep the stronger warning.
            if (matrixPose.state === 'normal' && landmarkPose.state !== 'normal') {
                return { ...landmarkPose, matrix: matrixPose };
            }
            return { ...matrixPose, fallback: landmarkPose };
        }

        // Face Landmarker 辅助（仅可靠人脸使用）
        async function runFaceLandmarkerDirect(sourceCanvas, faceBox) {
            if (!faceLandmarker) return null;
            const fx = Math.max(0, Math.floor(faceBox.originX));
            const fy = Math.max(0, Math.floor(faceBox.originY));
            const fw = Math.ceil(faceBox.width), fh = Math.ceil(faceBox.height);
            const fc = document.createElement('canvas'); fc.width = fw; fc.height = fh;
            const fctx = fc.getContext('2d', { willReadFrequently: true });
            fctx.drawImage(sourceCanvas, fx, fy, fw, fh, 0, 0, fw, fh);
            try {
                const r = faceLandmarker.detect(fc);
                if (r.faceLandmarks && r.faceLandmarks.length > 0) {
                    const matrix = r.facialTransformationMatrixes?.[0] || r.facialTransformationMatrixes?.[0]?.data;
                    return estimateHeadPoseFromLandmarks(r.faceLandmarks[0], matrix);
                }
            } catch (e) {}
            return null;
        }

        // ========== Pose Landmarker：全帧人体姿态 → 匹配到人 ==========
        async function detectPoses(sourceCanvas) {
            if (!poseLandmarker) return [];
            try {
                const result = poseLandmarker.detect(sourceCanvas);
                return result.landmarks || []; // Array<NormalizedLandmark[]>, 每人一组33点
            } catch (e) { return []; }
        }

        function mapTilePose(pose, tile, fullW, fullH) {
            return pose.map(kp => ({
                ...kp,
                x: (tile.srcX + kp.x * tile.srcW) / fullW,
                y: (tile.srcY + kp.y * tile.srcH) / fullH
            }));
        }

        function poseCenter(pose) {
            const lSh = pose[11], rSh = pose[12], nose = pose[0], lHip = pose[23], rHip = pose[24];
            const points = [lSh, rSh, nose, lHip, rHip].filter(Boolean);
            if (points.length === 0) return null;
            return {
                x: points.reduce((sum, p) => sum + p.x, 0) / points.length,
                y: points.reduce((sum, p) => sum + p.y, 0) / points.length
            };
        }

        function poseScore(pose) {
            return [0, 2, 5, 11, 12, 23, 24]
                .map(i => pose[i])
                .filter(Boolean)
                .reduce((sum, kp) => sum + (kp.visibility ?? 0.45), 0);
        }

        function mergePoses(poses, fullW, fullH) {
            const sorted = poses.slice().sort((a, b) => poseScore(b) - poseScore(a));
            const merged = [];
            for (const pose of sorted) {
                const center = poseCenter(pose);
                if (!center) continue;
                const duplicate = merged.some(existing => {
                    const other = poseCenter(existing);
                    if (!other) return false;
                    const dx = (center.x - other.x) * fullW;
                    const dy = (center.y - other.y) * fullH;
                    return Math.hypot(dx, dy) < Math.max(28, fullW * 0.025);
                });
                if (!duplicate) merged.push(pose);
            }
            return merged;
        }

        async function detectPosesGrid(sourceCanvas) {
            const fullW = sourceCanvas.width;
            const fullH = sourceCanvas.height;
            const poses = [];

            poses.push(...await detectPoses(sourceCanvas));

            for (const tile of getGridTiles(fullW, fullH)) {
                const scale = Math.min(GRID_POSE_SCALE, GRID_MAX_TILE_SIDE / Math.max(tile.srcW, tile.srcH));
                const scaledW = Math.max(1, Math.round(tile.srcW * scale));
                const scaledH = Math.max(1, Math.round(tile.srcH * scale));
                const tileCanvas = document.createElement('canvas');
                tileCanvas.width = scaledW;
                tileCanvas.height = scaledH;
                const tileCtx = tileCanvas.getContext('2d', { willReadFrequently: true });
                tileCtx.imageSmoothingEnabled = true;
                tileCtx.imageSmoothingQuality = 'high';
                tileCtx.drawImage(sourceCanvas, tile.srcX, tile.srcY, tile.srcW, tile.srcH, 0, 0, scaledW, scaledH);

                const tilePoses = await detectPoses(tileCanvas);
                tilePoses.forEach(pose => poses.push(mapTilePose(pose, tile, fullW, fullH)));
            }

            return mergePoses(poses, fullW, fullH);
        }

        async function getCachedPoses(sourceCanvas, now) {
            const interval = detectionMode === 'classroom' ? POSE_DETECT_INTERVAL_MS : 300;
            if (now - lastPoseDetectTime >= interval) {
                lastPoseDetectTime = now;
                // 大教室人数多时，Pose 分块检测会非常重。这里保留全图低频 Pose
                // 作为状态辅助；人数检测仍由 rolling grid face detections 承担。
                lastPoses = await detectPoses(sourceCanvas);
                lastPosesTimestamp = now;
                return lastPoses;
            }
            if (now - lastPosesTimestamp <= CACHE_MAX_AGE_MS) return lastPoses;
            return [];
        }

        function matchFaceToPose(faceBox, poses, canvasW, canvasH) {
            const fx = faceBox.originX + faceBox.width / 2;
            const fy = faceBox.originY + faceBox.height;
            let bestDist = Infinity, bestPose = null;

            for (const lm of poses) {
                // 用鼻子(0)或肩中点(11+12)判断人体中心
                const nose = lm[0];
                const lSh = lm[11], rSh = lm[12];
                let cx, cy;
                // visibility 可能 undefined → 视为可见
                const vis = (kp) => kp && (kp.visibility === undefined || kp.visibility > 0.1);
                if (vis(lSh) && vis(rSh)) {
                    cx = ((lSh.x + rSh.x) / 2) * canvasW;
                    cy = ((lSh.y + rSh.y) / 2) * canvasH;
                } else if (vis(nose)) {
                    cx = nose.x * canvasW;
                    cy = nose.y * canvasH;
                } else continue;

                const dist = Math.hypot(cx - fx, cy - fy);
                if (dist < bestDist) { bestDist = dist; bestPose = lm; }
            }
            // 距离必须合理（< 脸宽的 3 倍）
            if (bestDist < faceBox.width * 5) return bestPose;
            return null;
        }

        function derivePoseState(poseLandmarks, canvasW, canvasH) {
            if (!poseLandmarks || poseLandmarks.length < 13) return null;

            const nose = poseLandmarks[0];
            const lEye = poseLandmarks[2];  // left eye
            const rEye = poseLandmarks[5];  // right eye
            const lEar = poseLandmarks[7];
            const rEar = poseLandmarks[8];
            const lSh = poseLandmarks[11];
            const rSh = poseLandmarks[12];

            const vis = (kp, th) => kp && (kp.visibility === undefined || kp.visibility > th);
            const hasHead = vis(nose, 0.1);
            const hasEyes = vis(lEye, 0.05) && vis(rEye, 0.05);
            const hasShoulders = vis(lSh, 0.1) && vis(rSh, 0.1);

            if (!hasHead) {
                if (hasShoulders) return { source: 'pose', state: 'sleep', label: '疑似睡觉', detail: '有身体但无头部', confidence: 0.55 };
                return null;
            }

            if (!hasShoulders) return { source: 'pose', state: 'unknown', label: '无法判断', detail: '无肩部参考', confidence: 0.25 };

            // 肩中点 Y
            const midShY = (lSh.y + rSh.y) / 2;
            const noseY = nose.y;
            const eyeMidY = hasEyes ? (lEye.y + rEye.y) / 2 : noseY;
            const shoulderWidth = Math.abs(rSh.x - lSh.x);
            const headShoulderGap = midShY - eyeMidY;
            const normalizedGap = shoulderWidth > 0 ? headShoulderGap / shoulderWidth : headShoulderGap;

            // 头部在肩上方 → 抬头；鼻子接近/低于肩线 → 看桌面
            const headAboveShoulders = normalizedGap > 0.22;
            const noseNearShoulder = noseY > midShY - Math.max(0.02, shoulderWidth * 0.08);

            if (headAboveShoulders && !noseNearShoulder) {
                return {
                    source: 'pose',
                    state: 'up',
                    label: '抬头',
                    detail: `头肩距${normalizedGap.toFixed(2)}`,
                    confidence: Math.min(0.9, 0.45 + normalizedGap)
                };
            }
            if (noseNearShoulder) {
                return {
                    source: 'pose',
                    state: 'down',
                    label: '看桌面',
                    detail: `鼻近肩线 gap=${normalizedGap.toFixed(2)}`,
                    confidence: 0.65
                };
            }
            const rel = noseY > midShY ? '低于' : '高于';
            return { source: 'pose', state: 'unknown', label: '无法判断', detail: `鼻${rel}肩${Math.abs(noseY-midShY).toFixed(3)}`, confidence: 0.35 };
        }

        function poseToStudyState(poseState) {
            if (!poseState) return '无法判断';
            if (poseState.state === 'up') return '抬头';
            if (poseState.state === 'down') return '看桌面';
            if (poseState.state === 'sleep') return '疑似睡觉';
            return '无法判断';
        }

        function poseAverageVisibility(poseLandmarks) {
            if (!poseLandmarks || poseLandmarks.length === 0) return 0;
            const points = [0, 2, 5, 7, 8, 11, 12, 23, 24]
                .map(i => poseLandmarks[i])
                .filter(Boolean);
            if (points.length === 0) return 0;
            return points.reduce((sum, p) => sum + (p.visibility ?? 0.5), 0) / points.length;
        }

        function buildPoseBox(poseLandmarks, canvasW, canvasH) {
            if (!poseLandmarks || poseLandmarks.length < 13) return null;

            const usable = [0, 2, 5, 7, 8, 11, 12, 23, 24]
                .map(i => poseLandmarks[i])
                .filter(p => p && (p.visibility === undefined || p.visibility > 0.08));

            const lSh = poseLandmarks[11];
            const rSh = poseLandmarks[12];
            const hasShoulders = lSh && rSh &&
                (lSh.visibility === undefined || lSh.visibility > 0.08) &&
                (rSh.visibility === undefined || rSh.visibility > 0.08);

            if (usable.length < 2 && !hasShoulders) return null;

            let xs = usable.map(p => p.x * canvasW);
            let ys = usable.map(p => p.y * canvasH);

            if (hasShoulders) {
                const shoulderWidth = Math.max(24, Math.abs(rSh.x - lSh.x) * canvasW);
                const midX = ((lSh.x + rSh.x) / 2) * canvasW;
                const midY = ((lSh.y + rSh.y) / 2) * canvasH;
                xs.push(midX - shoulderWidth * 0.65, midX + shoulderWidth * 0.65);
                ys.push(midY - shoulderWidth * 1.25, midY + shoulderWidth * 0.35);
            }

            const minX = Math.max(0, Math.min(...xs));
            const maxX = Math.min(canvasW, Math.max(...xs));
            const minY = Math.max(0, Math.min(...ys));
            const maxY = Math.min(canvasH, Math.max(...ys));
            const pad = Math.max(8, (maxX - minX) * 0.18);

            return {
                originX: Math.max(0, minX - pad),
                originY: Math.max(0, minY - pad),
                width: Math.min(canvasW - Math.max(0, minX - pad), (maxX - minX) + pad * 2),
                height: Math.min(canvasH - Math.max(0, minY - pad), (maxY - minY) + pad * 2)
            };
        }

        // ========== 学习状态判断 ==========
        function updateTrackStudyState(track, candidateState) {
            // DEBUG：直接赋值，不做去抖
            track.studyState = candidateState || '无法判断';
            track.studyStateCandidate = candidateState;
            track.studyStateSince = Date.now();

            // === 去抖逻辑（暂时禁用，调试完恢复） ===
            // const now = Date.now();
            // const stableMs = {
            //     '抬头': 1000,
            //     '看桌面': 1500,
            //     '疑似睡觉': 5000,
            //     '无法判断': 1000
            // };
            // if (!track.studyStateCandidate || track.studyStateCandidate !== candidateState) {
            //     track.studyStateCandidate = candidateState;
            //     track.studyStateSince = now;
            //     track.studyState = track.studyState || '无法判断';
            //     return;
            // }
            // if (now - track.studyStateSince >= (stableMs[candidateState] || 1000)) {
            //     track.studyState = candidateState;
            // }
        }

        function deriveCandidateState(track) {
            // 清晰人脸优先使用 Face Landmarker 的角度/几何判断。
            if (track.headPose) {
                if (track.headPose.state === 'up' || track.headPose.state === 'normal') return '抬头';
                if (track.headPose.state === 'down') return '看桌面';
                if (track.headPose.state === 'side') return '无法判断';
            }

            // 无清晰脸时，使用 PoseLandmarker 的头肩关系判断。
            if (track.poseState) {
                return poseToStudyState(track.poseState);
            }

            // 可靠人脸但角度暂时不可用 → 保守视为抬头。
            if (track._class === 'reliable') return '抬头';

            return '无法判断';
        }

        // ========== 人脸跟踪 + 平滑 + 三层过滤 ==========
        function iou(boxA, boxB) {
            const ax1 = boxA.originX, ay1 = boxA.originY;
            const ax2 = ax1 + boxA.width, ay2 = ay1 + boxA.height;
            const bx1 = boxB.originX, by1 = boxB.originY;
            const bx2 = bx1 + boxB.width, by2 = by1 + boxB.height;
            const interX = Math.max(0, Math.min(ax2, bx2) - Math.max(ax1, bx1));
            const interY = Math.max(0, Math.min(ay2, by2) - Math.max(ay1, by1));
            const inter = interX * interY;
            const union = boxA.width * boxA.height + boxB.width * boxB.height - inter;
            return union > 0 ? inter / union : 0;
        }

        function normalizeStudyState(state) {
            return STUDY_STATES.includes(state) ? state : '无法判断';
        }

        function createDurationBucket() {
            return STUDY_STATES.reduce((bucket, state) => {
                bucket[state] = 0;
                return bucket;
            }, {});
        }

        function boxCenter(box) {
            return {
                x: box.originX + box.width / 2,
                y: box.originY + box.height / 2
            };
        }

        function centerDistance(boxA, boxB) {
            const a = boxCenter(boxA);
            const b = boxCenter(boxB);
            return Math.hypot(a.x - b.x, a.y - b.y);
        }

        function addVisibleDuration(track, nowMs) {
            if (!track || !track.lastUpdatedAt) return;
            const elapsed = Math.max(0, nowMs - track.lastUpdatedAt);
            const state = normalizeStudyState(track.currentState);
            track.durations[state] += elapsed;
            track.visibleMs += elapsed;
            track.lastUpdatedAt = nowMs;
        }

        function getProjectedDurations(track, nowMs) {
            const durations = { ...track.durations };
            let visibleMs = track.visibleMs;
            if (track.active && track.lastUpdatedAt) {
                const elapsed = Math.max(0, nowMs - track.lastUpdatedAt);
                const state = normalizeStudyState(track.currentState);
                durations[state] += elapsed;
                visibleMs += elapsed;
            }
            return { durations, visibleMs };
        }

        function findAnalyticsMatch(face, usedTrackIds, videoW, videoH, nowMs) {
            let best = null;
            let bestScore = 0;
            const minFrameSide = Math.min(videoW || 640, videoH || 480);

            for (const track of analyticsTracks) {
                if (usedTrackIds.has(track.id)) continue;
                const gapMs = nowMs - track.lastSeenAt;
                if (gapMs > ANALYTICS_TRACK_TTL_MS) continue;

                const overlap = iou(track.box, face.box);
                const dist = centerDistance(track.box, face.box);
                const dynamicDistance = Math.max(
                    70,
                    minFrameSide * 0.08,
                    Math.max(track.box.width, track.box.height, face.box.width, face.box.height) * 1.2
                );
                if (overlap < ANALYTICS_MATCH_IOU && dist > dynamicDistance) continue;

                const distanceScore = Math.max(0, 1 - dist / dynamicDistance);
                const score = overlap * 2 + distanceScore;
                if (score > bestScore) {
                    bestScore = score;
                    best = track;
                }
            }
            return best;
        }

        function updateAnalytics(faces, nowMs, videoW, videoH) {
            const usedTrackIds = new Set();

            faces.forEach((face, index) => {
                if (!face.box) return;
                const currentState = normalizeStudyState(face.studyState);
                let track = findAnalyticsMatch(face, usedTrackIds, videoW, videoH, nowMs);

                if (!track) {
                    track = {
                        id: nextAnalyticsId++,
                        box: { ...face.box },
                        firstSeenAt: nowMs,
                        lastSeenAt: nowMs,
                        lastUpdatedAt: nowMs,
                        stateChangedAt: nowMs,
                        currentState,
                        durations: createDurationBucket(),
                        visibleMs: 0,
                        active: true,
                        source: face.source || (face._class === 'pose' ? 'pose-only' : 'face'),
                        detectionClass: face._class || 'unknown',
                        confidence: face.score ?? 0
                    };
                    analyticsTracks.push(track);
                } else {
                    addVisibleDuration(track, nowMs);
                    if (track.currentState !== currentState) {
                        track.currentState = currentState;
                        track.stateChangedAt = nowMs;
                    }
                    track.box = smoothBox(track.box, face.box);
                    track.lastSeenAt = nowMs;
                    track.active = true;
                    track.source = face.source || (face._class === 'pose' ? 'pose-only' : 'face');
                    track.detectionClass = face._class || 'unknown';
                    track.confidence = face.score ?? track.confidence;
                }

                usedTrackIds.add(track.id);
                face.analyticsId = track.id;
                face.analyticsTrack = track;
                face.displayOrder = index + 1;
            });

            analyticsTracks.forEach(track => {
                if (!usedTrackIds.has(track.id)) track.active = false;
            });
            latestAnalyticsSnapshot = buildAnalyticsSnapshot(nowMs);
            if (nowMs - lastAnalyticsRenderAt >= ANALYTICS_RENDER_INTERVAL_MS) {
                lastAnalyticsRenderAt = nowMs;
                renderAnalytics(latestAnalyticsSnapshot);
            }
            return latestAnalyticsSnapshot;
        }

        function formatDuration(ms) {
            const totalSeconds = Math.max(0, Math.floor(ms / 1000));
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            if (minutes <= 0) return `${seconds}秒`;
            return `${minutes}分${String(seconds).padStart(2, '0')}秒`;
        }

        function buildAnalyticsSnapshot(nowMs) {
            const activeTracks = analyticsTracks.filter(track => track.active);
            const summary = {
                total: activeTracks.length,
                up: activeTracks.filter(track => track.currentState === '抬头').length,
                desk: activeTracks.filter(track => track.currentState === '看桌面').length,
                sleep: activeTracks.filter(track => track.currentState === '疑似睡觉').length,
                unknown: activeTracks.filter(track => track.currentState === '无法判断').length,
                totalSeen: analyticsTracks.length
            };

            const people = analyticsTracks
                .slice()
                .sort((a, b) => {
                    if (a.active !== b.active) return a.active ? -1 : 1;
                    return a.id - b.id;
                })
                .map(track => {
                    const projected = getProjectedDurations(track, nowMs);
                    return {
                        id: `person-${track.id}`,
                        active: track.active,
                        state: track.currentState,
                        source: track.source,
                        detectionClass: track.detectionClass,
                        confidence: Number((track.confidence ?? 0).toFixed(3)),
                        visibleMs: Math.round(projected.visibleMs),
                        durations: Object.fromEntries(
                            STUDY_STATES.map(state => [state, Math.round(projected.durations[state] || 0)])
                        ),
                        stateDurationMs: Math.round(nowMs - track.stateChangedAt),
                        firstSeenAtMs: Math.round(track.firstSeenAt),
                        lastSeenAtMs: Math.round(track.lastSeenAt),
                        box: {
                            x: Math.round(track.box.originX),
                            y: Math.round(track.box.originY),
                            width: Math.round(track.box.width),
                            height: Math.round(track.box.height)
                        }
                    };
                });

            return {
                generatedAt: new Date().toISOString(),
                summary,
                people
            };
        }

        function renderAnalytics(snapshot) {
            if (!snapshot) return;
            const s = snapshot.summary;
            stateSummaryEl.innerHTML = [
                `<span class="analytics-chip">当前：${s.total} 人</span>`,
                `<span class="analytics-chip">抬头：${s.up}</span>`,
                `<span class="analytics-chip">看桌面：${s.desk}</span>`,
                `<span class="analytics-chip">疑似睡觉：${s.sleep}</span>`,
                `<span class="analytics-chip">无法判断：${s.unknown}</span>`,
                `<span class="analytics-chip">累计：${s.totalSeen} 人</span>`
            ].join('');

            if (snapshot.people.length === 0) {
                personStatsBody.innerHTML = '<tr><td colspan="7" class="muted">等待检测数据...</td></tr>';
                return;
            }

            personStatsBody.innerHTML = snapshot.people.map(person => {
                const status = person.active ? person.state : `${person.state} / 暂离`;
                return `
                    <tr>
                        <td>${person.id}</td>
                        <td>${status}</td>
                        <td>${formatDuration(person.durations['抬头'])}</td>
                        <td>${formatDuration(person.durations['看桌面'])}</td>
                        <td>${formatDuration(person.durations['疑似睡觉'])}</td>
                        <td>${formatDuration(person.durations['无法判断'])}</td>
                        <td>${formatDuration(person.visibleMs)}</td>
                    </tr>
                `;
            }).join('');
        }

        function smoothBox(oldBox, newBox) {
            if (!oldBox) return { originX: newBox.originX, originY: newBox.originY, width: newBox.width, height: newBox.height };
            return {
                originX: oldBox.originX * (1 - EMA_ALPHA) + newBox.originX * EMA_ALPHA,
                originY: oldBox.originY * (1 - EMA_ALPHA) + newBox.originY * EMA_ALPHA,
                width:   oldBox.width   * (1 - EMA_SIZE_ALPHA) + newBox.width   * EMA_SIZE_ALPHA,
                height:  oldBox.height  * (1 - EMA_SIZE_ALPHA) + newBox.height  * EMA_SIZE_ALPHA,
            };
        }

        function classifyDetection(box, score) {
            const t = getFaceThresholds();
            if (box.width < t.minW || box.height < t.minH) return 'ignore';
            if (score < t.minConf) return 'ignore';
            if (box.width >= t.reliableW && box.height >= t.reliableH && score >= 0.5) return 'reliable';
            return 'distant';
        }

        function matchDetections(rawDetections) {
            const now = performance.now();

            // 1) 过滤
            const valid = [];
            for (const det of rawDetections) {
                const box = det.boundingBox;
                const score = det.categories?.[0]?.score ?? 0;
                const cls = classifyDetection(box, score);
                if (cls === 'ignore') continue;
                valid.push({ box: det.boundingBox, score, keypoints: det.keypoints || null, _class: cls });
            }

            // 2) 匹配已有 track
            const matched = new Set();
            const updated = [];

            for (const track of trackedFaces) {
                let bestIoU = 0.3;
                let bestIdx = -1;
                for (let i = 0; i < valid.length; i++) {
                    if (matched.has(i)) continue;
                    const iouVal = iou(track.box, valid[i].box);
                    if (iouVal > bestIoU) { bestIoU = iouVal; bestIdx = i; }
                }
                if (bestIdx >= 0) {
                    matched.add(bestIdx);
                    const v = valid[bestIdx];
                    track.box = smoothBox(track.box, v.box);
                    track.score = v.score;
                    track.keypoints = v.keypoints;
                    track._class = v._class;
                    track.confirmed = Math.min(track.confirmed + 1, CONFIRM_FRAMES);
                    track.lost = 0;
                    // 学习状态：每帧推导候选（DEBUG：直接赋值）
                    const candidate = deriveCandidateState(track);
                    updateTrackStudyState(track, candidate);
                    // 调试日志
                    if (performance.now() - debugLastLog >= 1000) {
                        console.log(`  🧑 人脸${track.id}:`, {
                            box: `${Math.round(track.box.width)}×${Math.round(track.box.height)}`,
                            class: track._class,
                            poseState: track.poseState ? track.poseState.label : 'null',
                            poseDetail: track.poseState ? track.poseState.detail : '',
                            headPose: track.headPose ? track.headPose.label : 'null',
                            candidateState: candidate,
                            finalState: track.studyState
                        });
                    }
                    updated.push(track);
                } else {
                    track.lost++;
                    if (track.lost <= LOST_FRAMES) updated.push(track);
                }
            }

            // 3) 新建 track
            for (let i = 0; i < valid.length; i++) {
                if (matched.has(i)) continue;
                const v = valid[i];
                updated.push({
                    id: nextFaceId++,
                    box: { originX: v.box.originX, originY: v.box.originY, width: v.box.width, height: v.box.height },
                    score: v.score,
                    keypoints: v.keypoints,
                    _class: v._class,
                    confirmed: 1,
                    lost: 0,
                    studyState: '无法判断',
                    studyStateCandidate: null,
                    studyStateSince: Date.now(),
                });
            }

            trackedFaces = updated;
            return trackedFaces.filter(t => t.confirmed >= CONFIRM_FRAMES);
        }

        // ---- 绘制单个检测框（轻量：方案B 仅四角线） ----
        function drawOneDetection(track, displayWidth) {
            const box = track.box;
            const x = box.originX;
            const y = box.originY;
            const w = box.width;
            const h = box.height;
            const score = track.score;
            const tier = track._class || 'distant';
            const isReliable = tier === 'reliable';
            const isPoseOnly = tier === 'pose';

            if (!showDetectionBox) return;

            // 颜色：可靠人脸=红，远距离人脸=黄，仅人体姿态=蓝
            const innerColor = isReliable
                ? 'rgba(255, 38, 64, 0.95)'
                : (isPoseOnly ? 'rgba(116, 185, 255, 0.95)' : 'rgba(255, 214, 10, 0.95)');
            const outerColor = 'rgba(0, 0, 0, 0.65)';

            // 仅四角线（方案B），无完整矩形
            const cornerLen = Math.max(14, Math.min(w, h) * 0.22);
            ctx.lineCap = 'round';

            function drawCornerSegment(cx, cy, dx, dy) {
                const x1 = cx, y1 = cy + dy * cornerLen;
                const x2 = cx, y2 = cy;
                const x3 = cx + dx * cornerLen, y3 = cy;

                // 外层暗色描边
                ctx.strokeStyle = outerColor;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.lineTo(x3, y3);
                ctx.stroke();

                // 内层亮线
                ctx.strokeStyle = innerColor;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.lineTo(x3, y3);
                ctx.stroke();
            }

            [
                [x, y, 1, 1], [x + w, y, -1, 1],
                [x, y + h, 1, -1], [x + w, y + h, -1, -1]
            ].forEach(([cx, cy, dx, dy]) => drawCornerSegment(cx, cy, dx, dy));

            // === 学习状态标签（右上角） ===
            const stateColors = {
                '抬头': 'rgba(0, 184, 148, 0.9)',
                '看桌面': 'rgba(9, 132, 227, 0.9)',
                '疑似睡觉': 'rgba(253, 126, 20, 0.9)',
                '无法判断': 'rgba(99, 110, 114, 0.85)'
            };
            const stateLabel = track.studyState || '无法判断';
            const stateText = track.analyticsId ? `P${track.analyticsId} ${stateLabel}` : stateLabel;
            const stateColor = stateColors[stateLabel] || stateColors['无法判断'];

            ctx.font = '10px sans-serif';
            const stateTextW = ctx.measureText(stateText).width;
            const stateH = 13, statePad = 2;
            const stateX = x + w - stateTextW - statePad * 2;
            const stateY = y - stateH - 4;

            if (stateY > 0) {
                ctx.fillStyle = stateColor;
                ctx.fillRect(stateX, stateY, stateTextW + statePad * 2, stateH + statePad);
                ctx.fillStyle = '#fff';
                ctx.fillText(stateText, stateX + statePad, stateY + stateH - 2);
            }

            // 置信度标签
            let label;
            if (isPoseOnly) {
                label = `人体 ${(score * 100).toFixed(0)}%`;
            } else if (isReliable && track.headPose) {
                const poseText = track.headPose.pitch !== undefined
                    ? `${track.headPose.label} p${track.headPose.pitch}°`
                    : track.headPose.label;
                label = `${poseText} ${(score * 100).toFixed(0)}%`;
            } else if (isReliable) {
                label = `${(score * 100).toFixed(0)}%`;
            } else {
                label = `远距 ${(score * 100).toFixed(0)}%`;
            }

            ctx.font = '11px sans-serif';
            const textWidth = ctx.measureText(label).width;
            const textHeight = 14;
            const pad = 3;
            const labelY = y - 6;

            const bgColor = 'rgba(0, 0, 0, 0.65)';
            const textColor = isPoseOnly ? '#74b9ff' : (isReliable ? '#ffffff' : '#ffd60a');
            const textX = x + pad;

            if (labelY - textHeight > 0) {
                ctx.fillStyle = bgColor;
                ctx.fillRect(x, labelY - textHeight, textWidth + pad * 2, textHeight + pad);
                ctx.fillStyle = textColor;
                ctx.fillText(label, textX, labelY - 3);
            } else {
                ctx.fillStyle = bgColor;
                ctx.fillRect(x, y + 1, textWidth + pad * 2, textHeight + pad);
                ctx.fillStyle = textColor;
                ctx.fillText(label, textX, y + textHeight - 1);
            }

            // 关键点：仅可靠人脸 + w/h ≥ 60px
            if (detectionMode !== 'classroom' && isReliable && w >= 60 && h >= 60 && track.keypoints && track.keypoints.length > 0) {
                track.keypoints.forEach((kp, idx) => {
                    let kpX = kp.x, kpY = kp.y;
                    if (kpX <= 1 && kpY <= 1 && (kpX > 0 || kpY > 0)) {
                        kpX *= canvas.width;
                        kpY *= canvas.height;
                    }
                    if (kpX === 0 && kpY === 0) return;

                    const pointRadius = 2;
                    ctx.beginPath();
                    ctx.arc(kpX, kpY, pointRadius, 0, 2 * Math.PI);
                    ctx.fillStyle = 'rgba(116, 185, 255, 0.7)';
                    ctx.fill();

                    // 标签：更小字体
                    const kpLabel = KEYPOINT_NAMES[idx];
                    if (kpLabel) {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                        ctx.font = '9px -apple-system, BlinkMacSystemFont, sans-serif';
                        ctx.fillText(kpLabel, kpX + 3, kpY + 1);
                    }
                });
            }
        }

        function clamp01(value) {
            return Math.max(0, Math.min(1, value));
        }

        function mapBackendState(state) {
            if (state === '抬头') return 'head_up';
            if (state === '看桌面') return 'desk';
            if (state === '疑似睡觉') return 'sleep_like';
            return 'unknown';
        }

        function buildBackendPerson(face, index, videoW, videoH, windowSeconds) {
            const state = mapBackendState(face.studyState);
            const personId = face.analyticsId
                ? `person-${face.analyticsId}`
                : `person-${index + 1}`;

            return {
                personId,
                state,
                confidence: Number((face.score ?? face.poseState?.confidence ?? 0).toFixed(3)),
                visible: true,
                durationSeconds: windowSeconds,
                box: {
                    x: Number(clamp01(face.box.originX / videoW).toFixed(4)),
                    y: Number(clamp01(face.box.originY / videoH).toFixed(4)),
                    width: Number(clamp01(face.box.width / videoW).toFixed(4)),
                    height: Number(clamp01(face.box.height / videoH).toFixed(4))
                }
            };
        }

        function buildStatusPayload(faces, videoW, videoH) {
            const windowSeconds = BACKEND_POST_INTERVAL_MS / 1000;
            const people = faces.map((face, index) =>
                buildBackendPerson(face, index, videoW, videoH, windowSeconds)
            );

            return {
                deviceId: DEVICE_ID,
                classId: CLASS_ID,
                capturedAt: new Date().toISOString(),
                windowSeconds,
                frameInfo: {
                    fps,
                    width: videoW,
                    height: videoH
                },
                summary: {
                    total: people.length,
                    headUp: people.filter(p => p.state === 'head_up').length,
                    desk: people.filter(p => p.state === 'desk').length,
                    sleepLike: people.filter(p => p.state === 'sleep_like').length,
                    unknown: people.filter(p => p.state === 'unknown').length
                },
                people
            };
        }

        function maybeSendStatusPayload(payload, now) {
            latestStatusPayload = payload;
            window.latestClassroomStatusPayload = payload;
            window.getClassroomStatusPayload = () => latestStatusPayload;
            window.latestClassroomAnalytics = latestAnalyticsSnapshot;
            window.getClassroomAnalytics = () => latestAnalyticsSnapshot;

            if (!BACKEND_STATUS_ENDPOINT) return;
            if (now - lastBackendPostAt < BACKEND_POST_INTERVAL_MS) return;
            lastBackendPostAt = now;

            fetch(BACKEND_STATUS_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).catch(err => console.warn('状态数据发送失败:', err.message || err));
        }

        // ---- 主检测循环 ----
        async function detectAndDraw() {
            if (video.paused || video.ended) {
                requestAnimationFrame(detectAndDraw);
                return;
            }

            const displayWidth = video.videoWidth;
            const displayHeight = video.videoHeight;

            if (!displayWidth || !displayHeight) {
                requestAnimationFrame(detectAndDraw);
                return;
            }

            if (canvas.width !== displayWidth || canvas.height !== displayHeight) {
                canvas.width = displayWidth;
                canvas.height = displayHeight;
                console.log(`📐 canvas 尺寸更新: ${displayWidth}×${displayHeight}`);
            }

            debugVideoSize.textContent = `视频: ${displayWidth}×${displayHeight} | ${detectionMode === 'classroom' ? '大教室4×3轮询' : '普通'} | full_range${debugRawDetection ? ' DEBUG' : ''}`;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const now = performance.now();
            let detections = [];

            if (detectionMode === 'classroom') {
                // ---- 大教室模式：节流 + 分块检测 ----
                if (now - lastDetectTime >= DETECT_INTERVAL_MS) {
                    lastDetectTime = now;
                    try {
                        detections = await detectGrid(now);
                        lastDetections = detections;
                        lastDetectionsTimestamp = now;
                    } catch (e) {
                        console.error('分块检测出错:', e.message || e);
                        // 缓存过期则清空
                        if (now - lastDetectionsTimestamp > CACHE_MAX_AGE_MS) {
                            detections = [];
                        } else {
                            detections = lastDetections;
                        }
                    }
                } else if (now - lastDetectionsTimestamp <= CACHE_MAX_AGE_MS) {
                    detections = lastDetections;
                } else {
                    detections = []; // 缓存过期，等待新检测
                }
            } else {
                // ---- 普通模式：整帧检测 ----
                try {
                    const fullCanvas = document.createElement('canvas');
                    videoToCanvas(fullCanvas);
                    const result = await detectOnCanvas(fullCanvas);
                    detections = result.detections || [];
                } catch (e) {
                    console.error('检测出错:', e.message || e);
                }
            }

            // === 管道：debug 模式跳过跟踪 ===
            let displayFaces;
            let rawValidCount = 0;

            if (debugRawDetection) {
                const t = getFaceThresholds();
                const raw = [];
                for (const det of detections) {
                    const box = det.boundingBox;
                    const score = det.categories?.[0]?.score ?? 0;
                    const cls = classifyDetection(box, score);
                    if (cls === 'ignore') continue;
                    rawValidCount++;
                    raw.push({
                        box: { originX: box.originX, originY: box.originY, width: box.width, height: box.height },
                        score, keypoints: det.keypoints || null, _class: cls,
                        confirmed: 0, headPose: null, studyState: '无法判断',
                        _rawBox: `${Math.round(box.width)}×${Math.round(box.height)}`
                    });
                }
                displayFaces = raw;
            } else {
                displayFaces = matchDetections(detections);
            }

            // === Pose Landmarker：全帧一次 → 匹配到各人脸/人体 ===
            const fc = document.createElement('canvas');
            videoToCanvas(fc);
            const poses = await getCachedPoses(fc, now);
            const canvasW = fc.width, canvasH = fc.height;
            const usedPoseIndexes = new Set();

            // 诊断：每秒打印 Pose 数量 + 关键点可见性
            if (now - debugLastLog >= 1000) {
                console.log(`🦴 Pose检测: 检测到 ${poses.length} 人`);
                poses.forEach((lm, i) => {
                    const n = lm[0], ls = lm[11], rs = lm[12];
                    console.log(`  Pose${i}: 鼻(${n?.visibility?.toFixed(2)||'?'} ${n?.x?.toFixed(2)},${n?.y?.toFixed(2)}) 左肩(${ls?.visibility?.toFixed(2)||'?'}) 右肩(${rs?.visibility?.toFixed(2)||'?'})`);
                });
            }

            for (const face of displayFaces) {
                // 匹配最近的人体姿态
                const matchedPose = matchFaceToPose(face.box, poses, canvasW, canvasH);
                if (now - debugLastLog >= 1000 && displayFaces.indexOf(face) === 0) {
                    console.log(`  🔗 匹配: ${matchedPose ? '✅' : '❌'} faceBox=(${Math.round(face.box.originX)},${Math.round(face.box.originY)} ${Math.round(face.box.width)}×${Math.round(face.box.height)}) poses=${poses.length}`);
                }
                if (matchedPose) {
                    const poseIndex = poses.indexOf(matchedPose);
                    if (poseIndex >= 0) usedPoseIndexes.add(poseIndex);
                    face.poseLandmarks = matchedPose;
                    face.poseState = derivePoseState(matchedPose, canvasW, canvasH);
                } else {
                    face.poseLandmarks = null;
                    face.poseState = null;
                }

                // Face Landmarker：可靠人脸 ≥90px（作为辅助）
                if (face._class === 'reliable' && face.box.width >= 90 && face.box.height >= 90) {
                    face.headPose = await runFaceLandmarkerDirect(fc, face.box);
                } else {
                    face.headPose = null;
                }

                const candidate = deriveCandidateState(face);
                updateTrackStudyState(face, candidate);
            }

            // Pose-only 人物：能看到身体/肩部，但没检测到清晰脸。
            poses.forEach((pose, poseIndex) => {
                if (usedPoseIndexes.has(poseIndex)) return;
                const poseBox = buildPoseBox(pose, canvasW, canvasH);
                if (!poseBox || poseBox.width < 28 || poseBox.height < 28) return;

                const overlapsFace = displayFaces.some(face => iou(face.box, poseBox) > 0.18);
                if (overlapsFace) return;

                const poseState = derivePoseState(pose, canvasW, canvasH) || {
                    source: 'pose',
                    state: 'unknown',
                    label: '无法判断',
                    detail: '仅检测到人体',
                    confidence: 0.3
                };
                const score = Math.max(0.25, Math.min(0.85, poseAverageVisibility(pose)));
                const poseOnlyTrack = {
                    id: `pose-${poseIndex}`,
                    box: poseBox,
                    score,
                    keypoints: null,
                    _class: 'pose',
                    confirmed: 0,
                    lost: 0,
                    poseLandmarks: pose,
                    poseState,
                    headPose: null,
                    studyState: poseToStudyState(poseState),
                    studyStateCandidate: poseToStudyState(poseState),
                    studyStateSince: Date.now(),
                    source: 'pose-only'
                };
                displayFaces.push(poseOnlyTrack);
            });

            const reliableFaces = displayFaces.filter(f => f._class === 'reliable');
            const distantFaces = displayFaces.filter(f => f._class === 'distant');
            const poseOnlyFaces = displayFaces.filter(f => f._class === 'pose');

            // 每秒调试
            if (now - debugLastLog >= 1000) {
                console.log(`🔍 [${detectionMode}${debugRawDetection ? ' DEBUG' : ''}] full_range | raw:${detections.length} valid:${rawValidCount || displayFaces.length} (可靠:${reliableFaces.length} 远距:${distantFaces.length} 人体:${poseOnlyFaces.length})`);
                displayFaces.forEach((t, i) => {
                    const ri = t._rawBox ? ` raw:${t._rawBox}` : ` 平滑:${Math.round(t.box.width)}×${Math.round(t.box.height)}`;
                    const hp = t.headPose ? ` [${t.headPose.label}]` : '';
                    const ps = t.poseState ? ` pose=${t.poseState.label}/${t.poseState.detail}` : '';
                    console.log(`  人物 ${i + 1}: ${t._class}${hp}${ps} ${(t.score * 100).toFixed(0)}%${ri} 状态=${t.studyState} 确认${t.confirmed || 0}帧`);
                });
                if (!debugRawDetection && detections.length > 0 && displayFaces.length > 0) {
                    const rb = detections[0].boundingBox;
                    const sb = displayFaces[0].box;
                    console.log(`  📐 raw=(${Math.round(rb.originX)},${Math.round(rb.originY)} ${Math.round(rb.width)}×${Math.round(rb.height)}) smoothed=(${Math.round(sb.originX)},${Math.round(sb.originY)} ${Math.round(sb.width)}×${Math.round(sb.height)})`);
                }
                debugLastLog = now;
            }

            if (displayFaces.length > 0) lastConfidence = displayFaces[0].score;
            else lastConfidence = null;
            debugLastScore.textContent = `最后置信度: ${lastConfidence ? (lastConfidence * 100).toFixed(0) + '%' : '--'}`;

            const analyticsSnapshot = updateAnalytics(displayFaces, now, displayWidth, displayHeight);

            // 绘制
            displayFaces.forEach(t => drawOneDetection(t, displayWidth));

            // UI
            const upCount = analyticsSnapshot.summary.up;
            const deskCount = analyticsSnapshot.summary.desk;
            const sleepCount = analyticsSnapshot.summary.sleep;
            const unknownCount = analyticsSnapshot.summary.unknown;
            let faceSummary = `检测到: ${analyticsSnapshot.summary.total} 人`;
            const parts = [];
            if (upCount > 0) parts.push(`抬头${upCount}`);
            if (deskCount > 0) parts.push(`看桌面${deskCount}`);
            if (sleepCount > 0) parts.push(`疑似睡觉${sleepCount}`);
            if (unknownCount > 0) parts.push(`无法判断${unknownCount}`);
            if (parts.length > 0) faceSummary += ` (${parts.join(' ')})`;
            faceCountEl.textContent = faceSummary;
            updateClassroomStatus(displayFaces.length);
            maybeSendStatusPayload(buildStatusPayload(displayFaces, displayWidth, displayHeight), now);

            frameCount++;
            if (now - lastTime >= 1000) {
                fps = Math.round(frameCount / ((now - lastTime) / 1000));
                frameCount = 0;
                lastTime = now;
                fpsEl.textContent = `FPS: ${fps}`;
            }

            requestAnimationFrame(detectAndDraw);
        }

        // ---- 模式切换 ----
        modeToggleBtn.addEventListener('click', () => {
            if (detectionMode === 'normal') {
                detectionMode = 'classroom';
                modeToggleBtn.textContent = '🏫 大教室模式';
                modeToggleBtn.classList.add('classroom');
                lastDetections = [];
                lastDetectTime = 0;
                trackedFaces = [];
                console.log('🔀 大教室模式（4×3重叠分块轮询 | 每轮3块 | 保留2.5秒结果 | ≥16px | 置信度≥0.18）');
            } else {
                detectionMode = 'normal';
                modeToggleBtn.textContent = '🏫 普通模式';
                modeToggleBtn.classList.remove('classroom');
                lastDetections = [];
                trackedFaces = [];
                console.log('🔀 普通模式（整帧 | ≥45px | 置信度≥0.45 | full_range）');
            }
        });

        // ========== 事件监听 ==========
        startCameraBtn.addEventListener('click', async () => {
            statusEl.textContent = '⏳ 切换到摄像头...';
            statusEl.className = 'status loading';
            try {
                await startCamera(cameraSelect.value);
                statusEl.textContent = '✅ 检测中';
                statusEl.className = 'status ready';
            } catch (e) {
                console.error('切换摄像头失败:', e);
            }
        });

        cameraSelect.addEventListener('change', async () => {
            if (currentInputSource !== 'camera') return;
            statusEl.textContent = '⏳ 切换摄像头...';
            statusEl.className = 'status loading';
            try {
                await startCamera(cameraSelect.value);
                statusEl.textContent = '✅ 检测中';
                statusEl.className = 'status ready';
            } catch (e) { /* 已在 startCamera 处理 */ }
        });

        startStreamBtn.addEventListener('click', async () => {
            statusEl.textContent = '⏳ 打开网络视频流...';
            statusEl.className = 'status loading';
            try {
                await startNetworkStream(streamUrlInput.value);
                permissionHelp.classList.remove('visible');
                if (!detectLoopStarted) {
                    detectLoopStarted = true;
                    detectAndDraw();
                }
            } catch (err) {
                console.error('打开网络流失败:', err);
                statusEl.textContent = '❌ ' + (err.message || '网络流打开失败');
                statusEl.className = 'status error';
            }
        });

        showBoxCheckbox.addEventListener('change', () => {
            showDetectionBox = showBoxCheckbox.checked;
            console.log(`👁 显示检测框: ${showDetectionBox ? '开启' : '关闭（仅统计人数）'}`);
        });

        retryCameraBtn.addEventListener('click', async () => {
            try {
                statusEl.textContent = '⏳ 正在重新请求摄像头...';
                statusEl.className = 'status loading';
                await startCamera(cameraSelect.value);
                permissionHelp.classList.remove('visible');
                statusEl.textContent = '✅ 检测中';
                statusEl.className = 'status ready';
                if (!detectLoopStarted) {
                    detectLoopStarted = true;
                    detectAndDraw();
                }
            } catch (err) {
                console.error('重新请求摄像头失败:', err);
                showCameraError(err);
            }
        });

        // ========== 主流程 ==========
        (async function main() {
            try {
                const params = new URLSearchParams(window.location.search);
                const streamFromUrl = params.get('stream') || params.get('video');
                const savedStreamUrl = localStorage.getItem('classroomStreamUrl');
                if (streamFromUrl || savedStreamUrl) {
                    streamUrlInput.value = streamFromUrl || savedStreamUrl;
                }

                const cameras = await enumerateCameras();
                if (cameras.length === 0 && !streamUrlInput.value) {
                    statusEl.textContent = '⚠️ 未检测到摄像头设备';
                    statusEl.className = 'status error';
                    return;
                }

                const selectedId = cameraSelect.value;
                statusEl.textContent = '⏳ 下载AI模型中...';
                await loadModels();

                if (streamFromUrl) {
                    statusEl.textContent = '⏳ 打开网络视频流...';
                    await startNetworkStream(streamFromUrl);
                } else if (cameras.length > 0) {
                    await startCamera(selectedId);
                } else if (streamUrlInput.value) {
                    statusEl.textContent = '⏳ 打开网络视频流...';
                    await startNetworkStream(streamUrlInput.value);
                }

                permissionHelp.classList.remove('visible');
                statusEl.textContent = currentInputSource === 'stream' ? '✅ 网络流检测中' : '✅ 检测中';
                statusEl.className = 'status ready';

                if (!detectLoopStarted) {
                    detectLoopStarted = true;
                    detectAndDraw();
                }
            } catch (err) {
                console.error('初始化失败:', err);
                showCameraError(err);
            }
        })();
    </script>
</body>
</html>
